# Avisos del bancal de 33 lechugas (el campo donde Kylia decide de verdad).
# Los 2 crons de Vercel Hobby están ocupados (recordatorio-wizard + diario-b),
# así que estos dos disparos diarios van por GitHub Actions:
#
#   06:45 Madrid (verano) → fase=manana   · la decisión, en el buzón para ~7:30
#   13:10 Madrid (verano) → fase=mediodia · ¿consta el riego que tocaba?
#
# El de la mañana se programa 06:45 (no 07:30) A PROPÓSITO: el scheduler de
# GitHub (gratis) retrasa el disparo un rato variable, así que se lanza con
# margen para que el correo esté en el buzón sobre las 7:30, antes del riego.
# Los cron de GitHub van en UTC fijo: en invierno se desplazan a 05:45/12:10
# hora local, que sigue valiendo.
#
# Secret opcional AVISO_TOKEN (Settings → Secrets → Actions): si se define aquí
# y en Vercel, el endpoint exige el token; sin definirlo, funciona abierto
# (mismo criterio que el resto de crons actuales).

name: aviso-lechugas

on:
  schedule:
    - cron: "45 4 * * *"   # mañana (06:45 Madrid verano; margen para llegar ~7:30)
    - cron: "10 11 * * *"  # mediodía
  workflow_dispatch:
    inputs:
      fase:
        description: "manana o mediodia"
        required: true
        default: "manana"

jobs:
  avisar:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint de avisos
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FASE="${{ inputs.fase }}"
          elif [ "${{ github.event.schedule }}" = "45 4 * * *" ]; then
            FASE="manana"
          else
            FASE="mediodia"
          fi
          echo "fase=$FASE"
          # --retry cubre transitorios (timeouts, 5xx): 3 intentos espaciados.
          # Si aun así falla (el endpoint devuelve 500 cuando ningún canal
          # entrega), el job falla y GitHub avisa por email del workflow roto.
          curl -fsS --retry 3 --retry-delay 30 "https://kylia.app/api/aviso-lechugas?fase=$FASE&token=${{ secrets.AVISO_TOKEN }}"
