<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Cuaderno de campo · Kylia</title>
<meta name="theme-color" content="#013A27" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --verde:#013A27; --verde-900:#001710; --verde-50:#E7F1EC;
    --slate-900:#0f172a; --slate-700:#334155; --slate-500:#64748b; --slate-200:#e2e8f0; --slate-50:#f8fafc;
    --radius:18px; --shadow:0 8px 24px -8px rgba(15,23,42,0.18);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:"Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color:var(--slate-900); line-height:1.55; background:var(--slate-50);
    -webkit-font-smoothing:antialiased; padding:18px;
  }
  .app { max-width:640px; margin:0 auto; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:800; color:var(--verde-900);
           letter-spacing:-0.02em; font-size:1.05rem; margin:6px 2px 14px; }
  .brand .dot { width:11px; height:11px; border-radius:50%; background:var(--verde); }
  h1 { font-size:1.5rem; color:var(--verde-900); letter-spacing:-0.02em; }
  .sub { color:var(--slate-500); font-size:0.92rem; margin-top:2px; }

  .card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:22px 20px; margin-top:18px; }
  .label { font-size:0.74rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
           color:var(--slate-500); margin-bottom:12px; }

  .parcela { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; font-size:0.9rem; }
  .parcela .k { color:var(--slate-500); font-size:0.78rem; }
  .parcela .v { font-weight:600; }

  .tabla-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.86rem; }
  th { text-align:left; font-size:0.72rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
       color:var(--slate-500); padding:6px 8px; border-bottom:2px solid var(--slate-200); white-space:nowrap; }
  td { padding:7px 8px; border-bottom:1px solid var(--slate-200); vertical-align:top; }
  td.num { text-align:right; white-space:nowrap; }
  th.num { text-align:right; }
  tr:last-child td { border-bottom:0; }
  .total td { font-weight:700; border-top:2px solid var(--slate-200); border-bottom:0; }
  .vacio { color:var(--slate-500); font-size:0.88rem; font-style:italic; }

  .btn-print { display:block; width:100%; margin-top:18px; padding:13px; border:0; border-radius:12px;
               background:var(--verde); color:#fff; font-family:inherit; font-size:1rem; font-weight:700; cursor:pointer; }
  .aviso { font-size:0.78rem; color:var(--slate-500); margin-top:14px; line-height:1.5; }
  .msg { text-align:center; color:var(--slate-500); padding:40px 20px; }

  @media print {
    body { background:#fff; padding:0; }
    .app { max-width:none; }
    .card { box-shadow:none; border:1px solid var(--slate-200); page-break-inside:avoid; }
    .btn-print { display:none; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="brand"><span class="dot"></span> Kylia</div>
  <h1>Cuaderno de campo</h1>
  <p class="sub" id="sub">Cargando…</p>
  <div id="cont"><div class="msg">Cargando tu cuaderno…</div></div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const ID = params.get("id") || params.get("usuario_id") || "";
  const cont = document.getElementById("cont");

  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
  function fmtFecha(iso){
    if(!iso) return "—";
    const [y,m,d] = iso.split("-");
    return `${d}/${m}/${y}`;
  }
  function n(v, dec=1){ return v==null ? "—" : Number(v).toLocaleString("es",{maximumFractionDigits:dec}); }
  const METODO = { goteo:"Goteo", aspersion:"Aspersión", surco:"Surco", manguera:"Manguera", regadera:"Regadera" };
  const FRANJA = { manana:"mañana", mediodia:"mediodía", tarde:"tarde", noche:"noche" };

  function tablaRiegos(riegos, area){
    if(!riegos.length) return `<p class="vacio">Sin riegos registrados todavía.</p>`;
    const totalLm2 = riegos.reduce((s,r)=>s+(r.l_m2||0),0);
    const filas = riegos.map(r => `<tr>
      <td>${fmtFecha(r.fecha)}</td>
      <td>${r.franja ? esc(FRANJA[r.franja]||r.franja) : "—"}</td>
      <td class="num">${r.duracion_min!=null ? n(r.duracion_min,0)+" min" : "—"}</td>
      <td class="num">${n(r.l_m2)}</td>
      <td class="num">${(r.l_m2!=null && area) ? n(r.l_m2*area,0) : "—"}</td>
    </tr>`).join("");
    const totalRow = `<tr class="total"><td colspan="3">Total (${riegos.length} riegos)</td>
      <td class="num">${n(totalLm2)}</td>
      <td class="num">${area ? n(totalLm2*area,0) : "—"}</td></tr>`;
    return `<div class="tabla-wrap"><table>
      <thead><tr><th>Fecha</th><th>Franja</th><th class="num">Duración</th><th class="num">L/m²</th><th class="num">Litros</th></tr></thead>
      <tbody>${filas}${totalRow}</tbody></table></div>`;
  }

  function tablaTratamientos(trats){
    if(!trats.length) return `<p class="vacio">Sin tratamientos fitosanitarios registrados.</p>`;
    const filas = trats.map(t => `<tr>
      <td>${fmtFecha(t.fecha)}</td>
      <td>${esc(t.producto||"—")}${t.sustancia?`<br><small style="color:var(--slate-500)">${esc(t.sustancia)}</small>`:""}</td>
      <td>${esc(t.dosis||"—")}</td>
      <td>${esc(t.motivo||"—")}</td>
      <td class="num">${t.plazo_seguridad_dias!=null ? t.plazo_seguridad_dias+" días" : "—"}</td>
    </tr>`).join("");
    return `<div class="tabla-wrap"><table>
      <thead><tr><th>Fecha</th><th>Producto</th><th>Dosis</th><th>Motivo</th><th class="num">Plazo seg.</th></tr></thead>
      <tbody>${filas}</tbody></table></div>`;
  }

  function tablaAbonados(abonados){
    if(!abonados.length) return `<p class="vacio">Sin abonados registrados.</p>`;
    const filas = abonados.map(a => `<tr>
      <td>${fmtFecha(a.fecha)}</td>
      <td>${esc(a.producto||"—")}</td>
      <td>${esc(a.dosis||"—")}</td>
      <td>${esc(a.notas||"—")}</td>
    </tr>`).join("");
    return `<div class="tabla-wrap"><table>
      <thead><tr><th>Fecha</th><th>Producto</th><th>Dosis</th><th>Notas</th></tr></thead>
      <tbody>${filas}</tbody></table></div>`;
  }

  function pintar(d){
    const p = d.parcela || {};
    document.getElementById("sub").textContent =
      `${p.cultivo ? p.cultivo.charAt(0).toUpperCase()+p.cultivo.slice(1) : "Parcela"}${p.ciudad ? " · " + p.ciudad : ""} · generado el ${fmtFecha(new Date().toISOString().slice(0,10))}`;
    cont.innerHTML = `
      <div class="card">
        <p class="label">Identificación de la parcela</p>
        <div class="parcela">
          <div><div class="k">Titular / parcela</div><div class="v">${esc(p.nombre||"—")}</div></div>
          <div><div class="k">Municipio</div><div class="v">${esc(p.ciudad||"—")}</div></div>
          <div><div class="k">Cultivo</div><div class="v">${esc(p.cultivo||"—")}</div></div>
          <div><div class="k">Superficie</div><div class="v">${p.area_m2 ? n(p.area_m2,0)+" m²" : "—"}</div></div>
          <div><div class="k">Sistema de riego</div><div class="v">${esc(METODO[p.metodo_riego]||p.metodo_riego||"—")}</div></div>
          <div><div class="k">Manejo</div><div class="v">${p.manejo==="ecologico"?"Ecológico":p.manejo==="convencional"?"Convencional":"—"}</div></div>
          <div><div class="k">Plantación / siembra</div><div class="v">${fmtFecha(p.fecha_plantacion)}</div></div>
        </div>
      </div>
      <div class="card"><p class="label">💧 Riegos</p>${tablaRiegos(d.riegos||[], p.area_m2)}</div>
      <div class="card"><p class="label">🧪 Tratamientos fitosanitarios</p>${tablaTratamientos(d.tratamientos||[])}</div>
      <div class="card"><p class="label">🌱 Fertilización</p>${tablaAbonados(d.abonados||[])}</div>
      <button class="btn-print" onclick="window.print()">🖨️ Imprimir / guardar en PDF</button>
      <p class="aviso">Borrador generado desde tu diario de campo en Kylia. Es la base del cuaderno de
      explotación (RD 1051/2022): revisa los datos y complétalo con lo que tu técnico o cooperativa
      te pida (referencia SIGPAC, nº de registro de los productos) antes de usarlo oficialmente.</p>`;
  }

  if(!ID){
    cont.innerHTML = `<div class="msg">Falta el identificador de la parcela.<br>Abre el cuaderno desde tu enlace personal.</div>`;
  } else {
    fetch(`/api/campo?vista=cuaderno&usuario_id=${encodeURIComponent(ID)}`)
      .then(r=>r.json())
      .then(d=>{ if(!d.ok) throw new Error(d.error||"no disponible"); pintar(d); })
      .catch(e=>{ cont.innerHTML = `<div class="msg">No se pudo cargar el cuaderno.<br><small>${esc(e.message)}</small></div>`; });
  }
</script>
</body>
</html>
