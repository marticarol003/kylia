<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bigBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#0f3617"/>
      <stop offset="100%" stop-color="#2b7a3a"/>
    </linearGradient>
    <linearGradient id="smallBar" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d4a82a"/>
      <stop offset="100%" stop-color="#e8c84a"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1080" height="1080" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="90" font-size="20" font-weight="700" letter-spacing="3" fill="#2b7a3a">KYLIA · CONTEXTO DE MERCADO</text>

  <!-- Titular -->
  <text x="80" y="163" font-size="52" font-weight="800" fill="#0f3617">La mayor oportunidad</text>
  <text x="80" y="225" font-size="52" font-weight="800" fill="#2b7a3a">del campo español.</text>
  <text x="80" y="278" font-size="20" font-weight="400" fill="#445">23,5 millones de ha. Una industria que decide mirando al cielo.</text>

  <!-- Separador -->
  <line x1="80" y1="308" x2="1000" y2="308" stroke="#e8f3ea" stroke-width="3"/>

  <!-- Barras comparativas de mercado -->
  <text x="80" y="358" font-size="16" font-weight="700" letter-spacing="2" fill="#778">SUPERFICIE AGRÍCOLA ÚTIL SPAIN · ADOPCIÓN DIGITAL (est.)</text>

  <!-- Barra grande: no digitalizado -->
  <text x="80" y="404" font-size="17" font-weight="600" fill="#0f3617">Sin herramienta digital de precisión</text>
  <rect x="80" y="414" width="810" height="64" rx="12" fill="url(#bigBar)"/>
  <text x="104" y="455" font-size="26" font-weight="800" fill="#ffffff">~20,7 M hectáreas · 88 %</text>

  <!-- Barra pequeña: digitalizado -->
  <text x="80" y="516" font-size="17" font-weight="600" fill="#d4a82a">Con alguna herramienta de monitorización satelital</text>
  <rect x="80" y="526" width="252" height="64" rx="12" fill="url(#smallBar)"/>
  <text x="104" y="567" font-size="26" font-weight="800" fill="#0f3617">~2,8 M ha · 12 %</text>

  <!-- Separador -->
  <line x1="80" y1="612" x2="1000" y2="612" stroke="#f0f0f0" stroke-width="2"/>

  <!-- 3 estadísticas clave -->
  <text x="80" y="658" font-size="16" font-weight="700" letter-spacing="2" fill="#778">LOS NÚMEROS QUE DEFINEN LA OPORTUNIDAD</text>

  <!-- Stat 1 -->
  <rect x="80" y="678" width="277" height="180" rx="16" fill="#e8f3ea" stroke="#2b7a3a" stroke-width="2"/>
  <text x="218" y="740" font-size="52" font-weight="800" fill="#0f3617" text-anchor="middle">785K</text>
  <text x="218" y="774" font-size="18" font-weight="700" fill="#2b7a3a" text-anchor="middle">explotaciones</text>
  <text x="218" y="800" font-size="15" fill="#445" text-anchor="middle">agrícolas en España</text>
  <text x="218" y="826" font-size="13" fill="#778" text-anchor="middle">(MAPA 2024)</text>
  <text x="218" y="846" font-size="13" fill="#2b7a3a" text-anchor="middle">→ mercado potencial Kylia</text>

  <!-- Stat 2 -->
  <rect x="401" y="678" width="277" height="180" rx="16" fill="#f6f7f8" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="539" y="740" font-size="52" font-weight="800" fill="#0a0a0a" text-anchor="middle">3,8 %</text>
  <text x="539" y="774" font-size="18" font-weight="700" fill="#445" text-anchor="middle">SAU bajo riego</text>
  <text x="539" y="800" font-size="15" fill="#778" text-anchor="middle">con monitorización activa</text>
  <text x="539" y="826" font-size="13" fill="#aab" text-anchor="middle">(estimación interna)</text>
  <text x="539" y="846" font-size="13" fill="#d4a82a" text-anchor="middle">→ el potencial es 25× mayor</text>

  <!-- Stat 3 -->
  <rect x="722" y="678" width="277" height="180" rx="16" fill="#0f3617"/>
  <text x="860" y="740" font-size="52" font-weight="800" fill="#d4a82a" text-anchor="middle">2015</text>
  <text x="860" y="774" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">datos disponibles</text>
  <text x="860" y="800" font-size="15" fill="#a8d894" text-anchor="middle">Sentinel-2 opera</text>
  <text x="860" y="826" font-size="13" fill="#a8d894" text-anchor="middle">desde hace 9 años</text>
  <text x="860" y="846" font-size="13" fill="#d4a82a" text-anchor="middle">→ nadie los había traducido</text>

  <!-- Separador -->
  <line x1="80" y1="876" x2="1000" y2="876" stroke="#e8f3ea" stroke-width="3"/>

  <!-- Conclusión -->
  <rect x="80" y="896" width="920" height="104" rx="20" fill="#e8f3ea" stroke="#2b7a3a" stroke-width="2"/>
  <text x="540" y="934" font-size="18" font-weight="700" letter-spacing="2" fill="#2b7a3a" text-anchor="middle">EL DATO QUE GUÍA KYLIA</text>
  <text x="540" y="966" font-size="22" font-weight="700" fill="#0f3617" text-anchor="middle">El problema no es que los datos no existan.</text>
  <text x="540" y="992" font-size="22" font-weight="700" fill="#2b7a3a" text-anchor="middle">Es que nadie los había puesto en el móvil del agricultor.</text>

  <!-- Footer -->
  <text x="80" y="1040" font-size="18" font-weight="600" fill="#0f3617">kylia.app · Agricultura de precisión por satélite</text>
  <text x="1000" y="1040" font-size="13" fill="#aab" text-anchor="end">Fuentes: MAPA · INE · estimación interna</text>
</svg>
