<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">

  <!-- Fondo -->
  <rect width="1080" height="1080" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="90" font-size="20" font-weight="700" letter-spacing="3" fill="#2b7a3a">KYLIA · COOPERATIVAS</text>

  <!-- Titular -->
  <text x="80" y="163" font-size="48" font-weight="800" fill="#0f3617">El lunes del técnico</text>
  <text x="80" y="223" font-size="48" font-weight="800" fill="#0f3617">de cooperativa.</text>
  <text x="80" y="273" font-size="20" font-weight="400" fill="#445">Mismo técnico. Misma mañana. Dos mundos.</text>

  <!-- Separador -->
  <line x1="80" y1="303" x2="1000" y2="303" stroke="#e0e0e0" stroke-width="2"/>

  <!-- Headers ANTES / DESPUÉS -->
  <rect x="80" y="323" width="428" height="48" rx="12" fill="#f0f0f0"/>
  <text x="294" y="353" font-size="18" font-weight="700" fill="#778" text-anchor="middle">❌ SIN KYLIA</text>

  <rect x="572" y="323" width="428" height="48" rx="12" fill="#2b7a3a"/>
  <text x="786" y="353" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">✓ CON KYLIA</text>

  <!-- FILA 1: 8:00 -->
  <rect x="80" y="380" width="428" height="90" rx="0" fill="#fafafa" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="572" y="380" width="428" height="90" rx="0" fill="#f0f8f1" stroke="#c8e6cc" stroke-width="1"/>
  <!-- Time badge -->
  <rect x="80" y="380" width="100" height="90" fill="#e8e8e8"/>
  <text x="130" y="422" font-size="18" font-weight="800" fill="#778" text-anchor="middle">8:00</text>
  <text x="130" y="446" font-size="14" fill="#aab" text-anchor="middle">AM</text>
  <!-- Antes content -->
  <text x="200" y="412" font-size="16" font-weight="600" fill="#0a0a0a">Llega. Espera llamadas.</text>
  <text x="200" y="436" font-size="14" fill="#778">No sabe qué parcelas necesitan atención.</text>
  <text x="200" y="458" font-size="14" fill="#aab">Reactivo.</text>
  <!-- Después content -->
  <rect x="572" y="380" width="100" height="90" fill="#d3e8d7"/>
  <text x="622" y="422" font-size="18" font-weight="800" fill="#2b7a3a" text-anchor="middle">8:00</text>
  <text x="622" y="446" font-size="14" fill="#2b7a3a" text-anchor="middle">AM</text>
  <text x="692" y="412" font-size="16" font-weight="600" fill="#0f3617">Abre panel Kylia.</text>
  <text x="692" y="436" font-size="14" fill="#445">Lista de socios por NDMI más bajo.</text>
  <text x="692" y="458" font-size="14" fill="#2b7a3a">3 alertas. Sabe exactamente adónde ir.</text>

  <!-- FILA 2: 9:30 -->
  <rect x="80" y="470" width="428" height="90" rx="0" fill="#fff8f8" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="572" y="470" width="428" height="90" rx="0" fill="#f0f8f1" stroke="#c8e6cc" stroke-width="1"/>
  <rect x="80" y="470" width="100" height="90" fill="#ffe0e0"/>
  <text x="130" y="512" font-size="18" font-weight="800" fill="#c94343" text-anchor="middle">9:30</text>
  <text x="130" y="536" font-size="14" fill="#c94343" text-anchor="middle">AM</text>
  <text x="200" y="502" font-size="16" font-weight="600" fill="#0a0a0a">Socio llama preocupado.</text>
  <text x="200" y="526" font-size="14" fill="#778">Abre Excel, busca referencia, 3 pestañas.</text>
  <text x="200" y="548" font-size="14" fill="#c94343">20 min para reconstruir el caso.</text>
  <rect x="572" y="470" width="100" height="90" fill="#d3e8d7"/>
  <text x="622" y="512" font-size="18" font-weight="800" fill="#2b7a3a" text-anchor="middle">9:30</text>
  <text x="622" y="536" font-size="14" fill="#2b7a3a" text-anchor="middle">AM</text>
  <text x="692" y="502" font-size="16" font-weight="600" fill="#0f3617">Técnico ya llamó al socio.</text>
  <text x="692" y="526" font-size="14" fill="#445">Con NDMI 0,26 y mapa intra-parcela.</text>
  <text x="692" y="548" font-size="14" fill="#2b7a3a">Decisión tomada: adelantar riego 9 días.</text>

  <!-- FILA 3: 11:00 -->
  <rect x="80" y="560" width="428" height="90" rx="0" fill="#fff8f8" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="572" y="560" width="428" height="90" rx="0" fill="#f0f8f1" stroke="#c8e6cc" stroke-width="1"/>
  <rect x="80" y="560" width="100" height="90" fill="#ffe0e0"/>
  <text x="130" y="602" font-size="18" font-weight="800" fill="#c94343" text-anchor="middle">11:00</text>
  <text x="130" y="626" font-size="14" fill="#c94343" text-anchor="middle">AM</text>
  <text x="200" y="592" font-size="16" font-weight="600" fill="#0a0a0a">Otra llamada. Mismo proceso.</text>
  <text x="200" y="616" font-size="14" fill="#778">30 consultas/semana × 20 min = 10 horas.</text>
  <text x="200" y="638" font-size="14" fill="#c94343">Sin valor agronómico. Solo localizar info.</text>
  <rect x="572" y="560" width="100" height="90" fill="#d3e8d7"/>
  <text x="622" y="602" font-size="18" font-weight="800" fill="#2b7a3a" text-anchor="middle">11:00</text>
  <text x="622" y="626" font-size="14" fill="#2b7a3a" text-anchor="middle">AM</text>
  <text x="692" y="592" font-size="16" font-weight="600" fill="#0f3617">Visita de campo planificada.</text>
  <text x="692" y="616" font-size="14" fill="#445">Solo a las 3 parcelas con señal real.</text>
  <text x="692" y="638" font-size="14" fill="#2b7a3a">El resto: datos confirman que está bien.</text>

  <!-- FILA 4: Tarde -->
  <rect x="80" y="650" width="428" height="90" rx="0" fill="#fff8f8" stroke="#e8e8e8" stroke-width="1"/>
  <rect x="572" y="650" width="428" height="90" rx="0" fill="#f0f8f1" stroke="#c8e6cc" stroke-width="1"/>
  <rect x="80" y="650" width="100" height="90" fill="#ffe0e0"/>
  <text x="130" y="690" font-size="18" font-weight="800" fill="#c94343" text-anchor="middle">Tarde</text>
  <rect x="572" y="650" width="100" height="90" fill="#d3e8d7"/>
  <text x="622" y="690" font-size="18" font-weight="800" fill="#2b7a3a" text-anchor="middle">Tarde</text>
  <text x="200" y="682" font-size="16" font-weight="600" fill="#0a0a0a">Agotado de fricción.</text>
  <text x="200" y="706" font-size="14" fill="#778">No ha hecho trabajo agronómico real.</text>
  <text x="692" y="682" font-size="16" font-weight="600" fill="#0f3617">Informe semanal generado.</text>
  <text x="692" y="706" font-size="14" fill="#445">Socios con alertas gestionados. Datos al día.</text>

  <!-- Separador -->
  <line x1="80" y1="756" x2="1000" y2="756" stroke="#e8f3ea" stroke-width="3"/>

  <!-- Cálculo económico -->
  <rect x="80" y="776" width="920" height="150" rx="20" fill="#0f3617"/>
  <text x="540" y="820" font-size="18" font-weight="700" letter-spacing="2" fill="#a8d894" text-anchor="middle">EL COSTE REAL DE LAS 10 HORAS SEMANALES</text>
  <text x="540" y="862" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">Técnico 45.000 €/año brutos = 22 €/hora.</text>
  <text x="540" y="898" font-size="24" font-weight="700" fill="#d4a82a" text-anchor="middle">10 h/semana × 48 semanas × 22 € = 10.560 €/año.</text>
  <text x="540" y="924" font-size="18" font-weight="500" fill="#a8d894" text-anchor="middle">Kylia cooperativa: 2.900 €/año · todos los socios.</text>

  <!-- Footer -->
  <text x="80" y="990" font-size="20" font-weight="600" fill="#0f3617">cooperativas@kylia.app · kylia.app/cooperativas</text>
  <text x="1000" y="990" font-size="14" fill="#aab" text-anchor="end">Sentinel-2 · SIGPAC</text>
</svg>
