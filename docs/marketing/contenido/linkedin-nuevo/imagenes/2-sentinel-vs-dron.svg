<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">

  <!-- Fondo blanco -->
  <rect width="1080" height="1080" fill="#ffffff"/>

  <!-- Eyebrow -->
  <text x="80" y="90" font-size="20" font-weight="700" letter-spacing="3" fill="#2b7a3a">KYLIA · TECNOLOGÍA</text>

  <!-- Titular -->
  <text x="80" y="165" font-size="50" font-weight="800" fill="#0f3617">Sentinel-2 vs Drones.</text>
  <text x="80" y="225" font-size="50" font-weight="800" fill="#0f3617">Sin filtros de marketing.</text>
  <text x="80" y="278" font-size="20" font-weight="400" fill="#445">La comparativa que nadie en el sector quiere publicar.</text>

  <!-- Separador -->
  <line x1="80" y1="306" x2="1000" y2="306" stroke="#e8f3ea" stroke-width="3"/>

  <!-- Tabla comparativa -->
  <!-- Cabecera -->
  <rect x="80" y="326" width="920" height="56" rx="12" fill="#f6f7f8"/>
  <text x="340" y="360" font-size="18" font-weight="700" fill="#445" text-anchor="middle">CRITERIO</text>
  <line x1="490" y1="326" x2="490" y2="382" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="680" y="348" font-size="18" font-weight="800" fill="#0f3617" text-anchor="middle">🛰 SENTINEL-2</text>
  <text x="680" y="372" font-size="15" font-weight="500" fill="#2b7a3a" text-anchor="middle">Kylia usa esto</text>
  <line x1="860" y1="326" x2="860" y2="382" stroke="#e0e0e0" stroke-width="1.5"/>
  <text x="960" y="360" font-size="18" font-weight="700" fill="#778" text-anchor="middle">🚁 DRON</text>

  <!-- Filas -->
  <!-- Cobertura -->
  <rect x="80" y="382" width="920" height="72" rx="0" fill="#ffffff"/>
  <line x1="80" y1="454" x2="1000" y2="454" stroke="#f0f0f0" stroke-width="1"/>
  <text x="120" y="416" font-size="17" font-weight="600" fill="#0a0a0a">Cobertura de campo</text>
  <text x="120" y="442" font-size="15" fill="#778">¿Cuánto cubre en una pasada?</text>
  <line x1="490" y1="382" x2="490" y2="454" stroke="#e0e0e0" stroke-width="1"/>
  <text x="680" y="412" font-size="18" font-weight="700" fill="#2b7a3a" text-anchor="middle">España entera</text>
  <text x="680" y="438" font-size="15" fill="#2b7a3a" text-anchor="middle">cada 5 días automático</text>
  <line x1="860" y1="382" x2="860" y2="454" stroke="#e0e0e0" stroke-width="1"/>
  <text x="960" y="412" font-size="17" font-weight="600" fill="#778" text-anchor="middle">1 parcela</text>
  <text x="960" y="438" font-size="15" fill="#aab" text-anchor="middle">vuelo por vuelo</text>

  <!-- Coste por vuelo -->
  <rect x="80" y="454" width="920" height="72" rx="0" fill="#fafafa"/>
  <line x1="80" y1="526" x2="1000" y2="526" stroke="#f0f0f0" stroke-width="1"/>
  <text x="120" y="488" font-size="17" font-weight="600" fill="#0a0a0a">Coste por pasada</text>
  <text x="120" y="514" font-size="15" fill="#778">Precio de obtener los datos</text>
  <line x1="490" y1="454" x2="490" y2="526" stroke="#e0e0e0" stroke-width="1"/>
  <text x="680" y="488" font-size="18" font-weight="700" fill="#2b7a3a" text-anchor="middle">0 € · datos públicos</text>
  <text x="680" y="514" font-size="15" fill="#2b7a3a" text-anchor="middle">Copernicus EU</text>
  <line x1="860" y1="454" x2="860" y2="526" stroke="#e0e0e0" stroke-width="1"/>
  <text x="960" y="488" font-size="17" font-weight="600" fill="#778" text-anchor="middle">100-400 €/vuelo</text>
  <text x="960" y="514" font-size="15" fill="#aab" text-anchor="middle">más piloto certificado</text>

  <!-- Continuidad -->
  <rect x="80" y="526" width="920" height="72" rx="0" fill="#ffffff"/>
  <line x1="80" y1="598" x2="1000" y2="598" stroke="#f0f0f0" stroke-width="1"/>
  <text x="120" y="560" font-size="17" font-weight="600" fill="#0a0a0a">Continuidad temporal</text>
  <text x="120" y="586" font-size="15" fill="#778">Puedo ver histórico de 6 meses?</text>
  <line x1="490" y1="526" x2="490" y2="598" stroke="#e0e0e0" stroke-width="1"/>
  <text x="680" y="560" font-size="18" font-weight="700" fill="#2b7a3a" text-anchor="middle">Sí · desde 2015</text>
  <text x="680" y="586" font-size="15" fill="#2b7a3a" text-anchor="middle">archivo completo</text>
  <line x1="860" y1="526" x2="860" y2="598" stroke="#e0e0e0" stroke-width="1"/>
  <text x="960" y="560" font-size="17" font-weight="600" fill="#778" text-anchor="middle">Solo desde</text>
  <text x="960" y="586" font-size="15" fill="#aab" text-anchor="middle">que empezaste a pagar</text>

  <!-- Mantenimiento -->
  <rect x="80" y="598" width="920" height="72" rx="0" fill="#fafafa"/>
  <line x1="80" y1="670" x2="1000" y2="670" stroke="#f0f0f0" stroke-width="1"/>
  <text x="120" y="632" font-size="17" font-weight="600" fill="#0a0a0a">Hardware que mantener</text>
  <text x="120" y="658" font-size="15" fill="#778">Baterías, actualizaciones, seguro</text>
  <line x1="490" y1="598" x2="490" y2="670" stroke="#e0e0e0" stroke-width="1"/>
  <text x="680" y="644" font-size="18" font-weight="700" fill="#2b7a3a" text-anchor="middle">Ninguno</text>
  <line x1="860" y1="598" x2="860" y2="670" stroke="#e0e0e0" stroke-width="1"/>
  <text x="960" y="632" font-size="17" font-weight="600" fill="#778" text-anchor="middle">Dron + batería</text>
  <text x="960" y="658" font-size="15" fill="#aab" text-anchor="middle">+ seguro + piloto</text>

  <!-- Resolución -->
  <rect x="80" y="670" width="920" height="72" rx="0" fill="#ffffff"/>
  <line x1="80" y1="742" x2="1000" y2="742" stroke="#f0f0f0" stroke-width="1"/>
  <text x="120" y="704" font-size="17" font-weight="600" fill="#0a0a0a">Resolución espacial</text>
  <text x="120" y="730" font-size="15" fill="#778">Tamaño mínimo detectable</text>
  <line x1="490" y1="670" x2="490" y2="742" stroke="#e0e0e0" stroke-width="1"/>
  <text x="680" y="704" font-size="18" font-weight="700" fill="#445" text-anchor="middle">10 m/píxel</text>
  <text x="680" y="730" font-size="15" fill="#445" text-anchor="middle">suficiente para estrés hídrico</text>
  <line x1="860" y1="670" x2="860" y2="742" stroke="#e0e0e0" stroke-width="1"/>
  <text x="960" y="704" font-size="17" font-weight="600" fill="#2b7a3a" text-anchor="middle">2-5 cm/píxel</text>
  <text x="960" y="730" font-size="15" fill="#2b7a3a" text-anchor="middle">más preciso, más caro</text>

  <!-- Separador -->
  <line x1="80" y1="754" x2="1000" y2="754" stroke="#e8f3ea" stroke-width="3"/>

  <!-- Conclusión -->
  <rect x="80" y="774" width="920" height="160" rx="20" fill="#e8f3ea" stroke="#2b7a3a" stroke-width="2"/>
  <text x="112" y="814" font-size="18" font-weight="700" letter-spacing="2" fill="#2b7a3a">NUESTRA POSICIÓN</text>
  <text x="112" y="852" font-size="20" font-weight="600" fill="#0f3617">Para monitorización masiva de parcelas → Sentinel-2 gana.</text>
  <text x="112" y="884" font-size="20" font-weight="600" fill="#0f3617">Para inspección puntual con alta resolución → el dron tiene sentido.</text>
  <text x="112" y="916" font-size="18" font-weight="500" fill="#445">Son herramientas distintas. Kylia no vende drones. Vendemos el dato continuo.</text>

  <!-- Footer -->
  <text x="80" y="990" font-size="20" font-weight="600" fill="#0f3617">kylia.app · Sentinel-2 sobre cualquier parcela SIGPAC de España</text>
  <text x="1000" y="990" font-size="14" fill="#aab" text-anchor="end">Copernicus · SIGPAC · MAPA</text>
</svg>
