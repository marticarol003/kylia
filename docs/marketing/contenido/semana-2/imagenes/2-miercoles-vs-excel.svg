<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <rect width="1080" height="1080" fill="#ffffff"/>

  <text x="80" y="120" font-size="22" font-weight="700" letter-spacing="3" fill="#2b7a3a">PRODUCTIVIDAD DEL TÉCNICO</text>

  <text x="80" y="200" font-size="58" font-weight="800" fill="#0f3617">10 horas a la semana</text>
  <text x="80" y="270" font-size="58" font-weight="800" fill="#0f3617">buscando información.</text>

  <text x="80" y="320" font-size="22" font-weight="500" fill="#445">El Excel "ya funciona" hasta que mides cuánto cuesta.</text>

  <!-- Comparativa horas/semana -->
  <g transform="translate(80,400)">
    <rect width="440" height="280" rx="20" fill="#f6f7f8" stroke="#d6d7d8"/>
    <text x="32" y="58" font-size="20" font-weight="700" letter-spacing="2" fill="#778">CON EXCEL</text>
    <text x="32" y="120" font-size="80" font-weight="800" fill="#9b3a3a">10 h</text>
    <text x="32" y="160" font-size="20" font-weight="600" fill="#445">/semana del técnico</text>
    <text x="32" y="210" font-size="18" font-weight="500" fill="#445">~30 consultas socio</text>
    <text x="32" y="240" font-size="18" font-weight="500" fill="#445">~20 min cada una</text>
    <text x="32" y="270" font-size="18" font-weight="700" fill="#9b3a3a">Coste anual: 11.000 €</text>
  </g>

  <g transform="translate(560,400)">
    <rect width="440" height="280" rx="20" fill="#e8f3ea" stroke="#2b7a3a" stroke-width="2"/>
    <text x="32" y="58" font-size="20" font-weight="700" letter-spacing="2" fill="#2b7a3a">CON KYLIA</text>
    <text x="32" y="120" font-size="80" font-weight="800" fill="#2b7a3a">2 h</text>
    <text x="32" y="160" font-size="20" font-weight="600" fill="#0f3617">/semana del técnico</text>
    <text x="32" y="210" font-size="18" font-weight="500" fill="#0f3617">Triaje automático lunes</text>
    <text x="32" y="240" font-size="18" font-weight="500" fill="#0f3617">Datos en 5 segundos</text>
    <text x="32" y="270" font-size="18" font-weight="700" fill="#2b7a3a">Coste anual: 5.900 €</text>
  </g>

  <!-- ROI box -->
  <g transform="translate(80,720)">
    <rect width="920" height="200" rx="20" fill="#0f3617"/>
    <text x="32" y="56" font-size="20" font-weight="700" letter-spacing="2" fill="#a8d894">EL CÁLCULO</text>
    <text x="32" y="108" font-size="32" font-weight="700" fill="#fff">Recuperas 8 h/semana del técnico</text>
    <text x="32" y="156" font-size="22" font-weight="500" fill="#d8ebdb">+ ahorras 5.000 €/año netos</text>
    <text x="32" y="186" font-size="22" font-weight="500" fill="#d8ebdb">+ mejor decisión agronómica para los 412 socios</text>
  </g>

  <!-- Pie -->
  <text x="80" y="1020" font-size="22" font-weight="600" fill="#0f3617">kylia.app/cooperativas</text>
  <text x="1000" y="1020" font-size="14" font-weight="500" fill="#778" text-anchor="end">Estimación con técnico ~45.000 €/año coste interno</text>
</svg>
