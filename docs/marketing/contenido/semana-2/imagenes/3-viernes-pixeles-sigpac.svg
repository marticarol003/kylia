<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <pattern id="px" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none" stroke="#0a0a0a" stroke-opacity="0.18"/>
    </pattern>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#a8d894"/>
      <stop offset="100%" stop-color="#2b7a3a"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1080" fill="#ffffff"/>

  <text x="80" y="120" font-size="22" font-weight="700" letter-spacing="3" fill="#2b7a3a">DEEP DIVE TÉCNICO</text>

  <text x="80" y="200" font-size="50" font-weight="800" fill="#0f3617">De 100 píxeles Sentinel-2</text>
  <text x="80" y="262" font-size="50" font-weight="800" fill="#0f3617">a una sola cifra fiable.</text>

  <text x="80" y="312" font-size="20" font-weight="500" fill="#445">Cómo agregamos píxeles 10×10 m sobre la geometría exacta del recinto SIGPAC.</text>

  <!-- Mockup: parcela con grid de píxeles + máscaras -->
  <g transform="translate(80,360)">
    <rect width="920" height="440" rx="16" fill="#f6f7f8" stroke="#e6e7e8"/>

    <!-- Polígono parcela SIGPAC -->
    <path d="M 80 80 L 460 60 L 540 240 L 380 380 L 100 360 Z" fill="url(#g1)" stroke="#0f3617" stroke-width="3" opacity="0.9"/>
    <!-- Grid de píxeles encima -->
    <rect x="40" y="40" width="540" height="380" fill="url(#px)"/>

    <!-- Píxeles excluidos: nubes (gris claro tachado) -->
    <rect x="80"  y="80"  width="40" height="40" fill="#d6d7d8" stroke="#0a0a0a" stroke-opacity="0.25"/>
    <rect x="120" y="80"  width="40" height="40" fill="#d6d7d8" stroke="#0a0a0a" stroke-opacity="0.25"/>
    <rect x="200" y="160" width="40" height="40" fill="#d6d7d8" stroke="#0a0a0a" stroke-opacity="0.25"/>
    <text x="92" y="105" font-size="20" font-weight="700" fill="#9b3a3a">×</text>
    <text x="132" y="105" font-size="20" font-weight="700" fill="#9b3a3a">×</text>
    <text x="212" y="185" font-size="20" font-weight="700" fill="#9b3a3a">×</text>

    <!-- Etiquetas a la derecha -->
    <g transform="translate(620,80)">
      <rect width="280" height="84" rx="10" fill="#fff" stroke="#0f3617" stroke-width="2"/>
      <text x="20" y="34" font-size="14" font-weight="700" letter-spacing="1.5" fill="#2b7a3a">PASO 1 · GEOMETRÍA</text>
      <text x="20" y="66" font-size="16" font-weight="600" fill="#0f3617">Polígono SIGPAC exacto</text>
    </g>
    <g transform="translate(620,180)">
      <rect width="280" height="84" rx="10" fill="#fff" stroke="#0f3617" stroke-width="2"/>
      <text x="20" y="34" font-size="14" font-weight="700" letter-spacing="1.5" fill="#2b7a3a">PASO 2 · MÁSCARA SCL</text>
      <text x="20" y="66" font-size="16" font-weight="600" fill="#0f3617">Excluir nubes y sombras</text>
    </g>
    <g transform="translate(620,280)">
      <rect width="280" height="84" rx="10" fill="#0f3617"/>
      <text x="20" y="34" font-size="14" font-weight="700" letter-spacing="1.5" fill="#a8d894">PASO 3 · MEDIANA</text>
      <text x="20" y="66" font-size="16" font-weight="600" fill="#fff">Robusta a outliers</text>
    </g>
  </g>

  <!-- Resultado -->
  <g transform="translate(80,830)">
    <rect width="920" height="120" rx="20" fill="#e8f3ea" stroke="#2b7a3a" stroke-width="2"/>
    <text x="32" y="50" font-size="20" font-weight="700" letter-spacing="2" fill="#2b7a3a">RESULTADO</text>
    <text x="32" y="92" font-size="22" font-weight="600" fill="#0f3617">NDVI 0,68 · NDMI 0,29 — agregado robusto sobre 87 píxeles válidos.</text>
  </g>

  <text x="80" y="1020" font-size="22" font-weight="600" fill="#0f3617">kylia.app · Sentinel-2 · SIGPAC</text>
  <text x="1000" y="1020" font-size="14" font-weight="500" fill="#778" text-anchor="end">Mediana &gt; media en datos con outliers</text>
</svg>
