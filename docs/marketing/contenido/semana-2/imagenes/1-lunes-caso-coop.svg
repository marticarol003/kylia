<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <rect width="1080" height="1080" fill="#ffffff"/>

  <text x="80" y="120" font-size="22" font-weight="700" letter-spacing="3" fill="#2b7a3a">CASO REAL · ABRIL 2026</text>

  <text x="80" y="200" font-size="58" font-weight="800" fill="#0f3617">Tres parcelas, una</text>
  <text x="80" y="270" font-size="58" font-weight="800" fill="#0f3617">decisión a tiempo.</text>

  <text x="80" y="320" font-size="22" font-weight="500" fill="#445">Cooperativa olivarera de Jaén · 412 socios · ~7.500 ha</text>

  <!-- Tarjetas de socio -->
  <g transform="translate(80,400)">
    <!-- Socio A -->
    <rect width="290" height="240" rx="16" fill="#fff" stroke="#e6e7e8" stroke-width="2"/>
    <text x="22" y="48" font-size="16" font-weight="700" letter-spacing="1.5" fill="#778">SOCIO A</text>
    <text x="22" y="86" font-size="22" font-weight="700" fill="#0f3617">Olivar 38 ha</text>
    <text x="22" y="116" font-size="15" font-weight="500" fill="#778">Vigor todavía alto</text>
    <text x="22" y="170" font-size="14" font-weight="700" letter-spacing="1.5" fill="#445">NDVI</text>
    <text x="22" y="208" font-size="36" font-weight="800" fill="#2b7a3a">0,71</text>
    <text x="160" y="170" font-size="14" font-weight="700" letter-spacing="1.5" fill="#445">NDMI</text>
    <text x="160" y="208" font-size="36" font-weight="800" fill="#d4a82a">0,27</text>
  </g>

  <g transform="translate(395,400)">
    <rect width="290" height="240" rx="16" fill="#fff" stroke="#e6e7e8" stroke-width="2"/>
    <text x="22" y="48" font-size="16" font-weight="700" letter-spacing="1.5" fill="#778">SOCIO B</text>
    <text x="22" y="86" font-size="22" font-weight="700" fill="#0f3617">Olivar 24 ha</text>
    <text x="22" y="116" font-size="15" font-weight="500" fill="#778">Estrés confirmado</text>
    <text x="22" y="170" font-size="14" font-weight="700" letter-spacing="1.5" fill="#445">NDVI</text>
    <text x="22" y="208" font-size="36" font-weight="800" fill="#2b7a3a">0,64</text>
    <text x="160" y="170" font-size="14" font-weight="700" letter-spacing="1.5" fill="#445">NDMI</text>
    <text x="160" y="208" font-size="36" font-weight="800" fill="#9b3a3a">0,22</text>
  </g>

  <g transform="translate(710,400)">
    <rect width="290" height="240" rx="16" fill="#fff" stroke="#e6e7e8" stroke-width="2"/>
    <text x="22" y="48" font-size="16" font-weight="700" letter-spacing="1.5" fill="#778">SOCIO C</text>
    <text x="22" y="86" font-size="22" font-weight="700" fill="#0f3617">Olivar 17 ha</text>
    <text x="22" y="116" font-size="15" font-weight="500" fill="#778">Bajo umbral</text>
    <text x="22" y="170" font-size="14" font-weight="700" letter-spacing="1.5" fill="#445">NDVI</text>
    <text x="22" y="208" font-size="36" font-weight="800" fill="#2b7a3a">0,68</text>
    <text x="160" y="170" font-size="14" font-weight="700" letter-spacing="1.5" fill="#445">NDMI</text>
    <text x="160" y="208" font-size="36" font-weight="800" fill="#d4a82a">0,28</text>
  </g>

  <!-- Acción -->
  <g transform="translate(80,690)">
    <rect width="920" height="200" rx="20" fill="#0f3617"/>
    <text x="32" y="56" font-size="20" font-weight="700" letter-spacing="2" fill="#a8d894">LA DECISIÓN</text>
    <text x="32" y="106" font-size="26" font-weight="700" fill="#fff">El técnico llamó a los tres socios el lunes por la mañana.</text>
    <text x="32" y="146" font-size="22" font-weight="500" fill="#d8ebdb">Riego adelantado 9 días en las parcelas críticas.</text>
    <text x="32" y="180" font-size="22" font-weight="500" fill="#d8ebdb">Pérdida estimada evitada: 200-400 €/ha en calidad de aceituna.</text>
  </g>

  <!-- Pie -->
  <text x="80" y="1020" font-size="22" font-weight="600" fill="#0f3617">kylia.app · Cooperativas desde 6.000 €/año</text>
  <text x="1000" y="1020" font-size="14" font-weight="500" fill="#778" text-anchor="end">Sentinel-2 · 22 abr 2026</text>
</svg>
