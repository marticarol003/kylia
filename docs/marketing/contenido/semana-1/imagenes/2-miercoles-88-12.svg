<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <rect width="1080" height="1080" fill="#ffffff"/>

  <text x="80" y="120" font-size="22" font-weight="700" letter-spacing="3" fill="#2b7a3a">EL DATO DE LA SEMANA</text>

  <text x="80" y="200" font-size="58" font-weight="800" fill="#0f3617">El campo español</text>
  <text x="80" y="270" font-size="58" font-weight="800" fill="#0f3617">decide a ojo.</text>

  <text x="80" y="320" font-size="22" font-weight="500" fill="#445">23,5 millones de hectáreas de SAU · solo el 12 % monitoriza</text>
  <text x="80" y="350" font-size="22" font-weight="500" fill="#445">por satélite. El 88 % no.</text>

  <!-- Barra grande 88% en gris (proporcional) -->
  <g transform="translate(80,420)">
    <rect width="880" height="120" rx="16" fill="#f0f1f2" stroke="#d6d7d8"/>
    <text x="40" y="50" font-size="24" font-weight="700" letter-spacing="2" fill="#778">DECIDE A OJO</text>
    <text x="40" y="105" font-size="68" font-weight="800" fill="#0a0a0a">88 %</text>
    <text x="850" y="78" font-size="20" font-weight="600" fill="#778" text-anchor="end">~20,7 M ha</text>
  </g>

  <!-- Barra pequeña 12% en verde (proporcional) -->
  <g transform="translate(80,580)">
    <rect width="280" height="120" rx="16" fill="#2b7a3a"/>
    <text x="32" y="50" font-size="22" font-weight="700" letter-spacing="2" fill="#e8f3ea">CON DATO</text>
    <text x="32" y="105" font-size="68" font-weight="800" fill="#ffffff">12 %</text>
  </g>
  <text x="384" y="640" font-size="22" font-weight="600" fill="#0f3617">~2,8 M ha</text>
  <text x="384" y="675" font-size="18" font-weight="500" fill="#445">monitorizadas con alguna herramienta digital</text>

  <!-- Insight -->
  <g transform="translate(80,760)">
    <rect width="920" height="180" rx="20" fill="#e8f3ea" stroke="#2b7a3a" stroke-width="2"/>
    <text x="32" y="50" font-size="20" font-weight="700" letter-spacing="2" fill="#2b7a3a">QUÉ NOS DICE</text>
    <text x="32" y="92" font-size="22" font-weight="600" fill="#0f3617">No es problema de tecnología — los datos Sentinel-2 llevan</text>
    <text x="32" y="124" font-size="22" font-weight="600" fill="#0f3617">años abiertos en Copernicus. Es problema de traducción:</text>
    <text x="32" y="156" font-size="22" font-weight="600" fill="#0f3617">nadie convierte la imagen en una frase útil para el agricultor.</text>
  </g>

  <!-- Pie -->
  <text x="80" y="1020" font-size="22" font-weight="600" fill="#0f3617">kylia.app</text>
  <text x="1000" y="1020" font-size="14" font-weight="500" fill="#778" text-anchor="end">Fuente: estimación interna sobre datos MAPA · INE</text>
</svg>
