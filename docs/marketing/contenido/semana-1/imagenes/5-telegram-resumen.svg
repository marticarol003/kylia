<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <rect width="1080" height="1350" fill="#0f3617"/>

  <text x="60" y="120" font-size="22" font-weight="700" letter-spacing="3" fill="#a8d894">PASADA SENTINEL-2</text>
  <text x="60" y="200" font-size="68" font-weight="800" fill="#ffffff">Resumen 22 abr</text>
  <text x="60" y="250" font-size="24" font-weight="500" fill="#a8d894">Medias por gran zona del campo español</text>

  <!-- KPI 1 -->
  <g transform="translate(60,310)">
    <rect width="960" height="180" rx="20" fill="#ffffff"/>
    <text x="32" y="58" font-size="20" font-weight="700" letter-spacing="2" fill="#2b7a3a">NDVI · CEREAL CASTILLA-LA MANCHA</text>
    <text x="32" y="128" font-size="64" font-weight="800" fill="#0f3617">0,52</text>
    <text x="280" y="128" font-size="24" font-weight="600" fill="#2b7a3a">estable</text>
    <text x="32" y="160" font-size="18" font-weight="500" fill="#778">Vigor moderado · dentro de rango histórico</text>
  </g>

  <!-- KPI 2 -->
  <g transform="translate(60,510)">
    <rect width="960" height="180" rx="20" fill="#ffffff"/>
    <text x="32" y="58" font-size="20" font-weight="700" letter-spacing="2" fill="#2b7a3a">NDVI · OLIVAR JAÉN</text>
    <text x="32" y="128" font-size="64" font-weight="800" fill="#0f3617">0,68</text>
    <text x="280" y="128" font-size="24" font-weight="600" fill="#9b3a3a">−2 % vs sem. anterior</text>
    <text x="32" y="160" font-size="18" font-weight="500" fill="#778">Ligera caída — vigilar la próxima pasada</text>
  </g>

  <!-- KPI 3 -->
  <g transform="translate(60,710)">
    <rect width="960" height="180" rx="20" fill="#ffffff" stroke="#d4a82a" stroke-width="3"/>
    <text x="32" y="58" font-size="20" font-weight="700" letter-spacing="2" fill="#d4a82a">NDMI · OLIVAR ANDALUCÍA · ALERTA</text>
    <text x="32" y="128" font-size="64" font-weight="800" fill="#0f3617">0,28</text>
    <text x="280" y="128" font-size="24" font-weight="600" fill="#d4a82a">señal temprana de estrés</text>
    <text x="32" y="160" font-size="18" font-weight="500" fill="#778">Por debajo de 0,30 ya conviene revisar el riego</text>
  </g>

  <!-- KPI 4 -->
  <g transform="translate(60,910)">
    <rect width="960" height="180" rx="20" fill="#ffffff"/>
    <text x="32" y="58" font-size="20" font-weight="700" letter-spacing="2" fill="#2b7a3a">HUMEDAD SUELO · CEREAL CASTILLA-LEÓN</text>
    <text x="32" y="128" font-size="64" font-weight="800" fill="#0f3617">32 %</text>
    <text x="280" y="128" font-size="24" font-weight="600" fill="#9b3a3a">−5 % vs media abril</text>
    <text x="32" y="160" font-size="18" font-weight="500" fill="#778">Invierno seco — campaña con margen ajustado</text>
  </g>

  <!-- CTA -->
  <g transform="translate(60,1140)">
    <rect width="960" height="140" rx="20" fill="#a8d894"/>
    <text x="32" y="56" font-size="22" font-weight="700" letter-spacing="2" fill="#0f3617">VER POR PARCELA</text>
    <text x="32" y="100" font-size="28" font-weight="700" fill="#0f3617">kylia.app · gratis hasta 20 ha</text>
  </g>

  <text x="540" y="1320" font-size="16" font-weight="500" fill="#a8d894" text-anchor="middle">Datos: Sentinel-2 · DWD ICON · agregados Kylia</text>
</svg>
