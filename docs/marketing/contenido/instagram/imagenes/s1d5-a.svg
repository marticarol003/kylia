<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Main headline -->
  <text x="72" y="220" font-size="86" font-weight="900" fill="white" letter-spacing="-2">TODO LO QUE</text>
  <text x="72" y="320" font-size="86" font-weight="900" fill="white" letter-spacing="-2">TU CAMPO</text>
  <text x="72" y="420" font-size="86" font-weight="900" fill="#a8d894" letter-spacing="-2">NECESITA.</text>

  <!-- Separator -->
  <rect x="72" y="460" width="936" height="1" fill="#1a4d24"/>

  <!-- 2x3 icon grid -->
  <!-- Row 1 -->
  <!-- Box 1: NDVI -->
  <rect x="60" y="500" width="460" height="180" rx="16" fill="#0f3617" stroke="#2b7a3a" stroke-width="1.5"/>
  <text x="100" y="580" font-size="36">🌿</text>
  <text x="160" y="575" font-size="26" font-weight="700" fill="white">NDVI</text>
  <text x="160" y="612" font-size="16" fill="#6aaa78">Vigor vegetativo</text>

  <!-- Box 2: NDMI -->
  <rect x="560" y="500" width="460" height="180" rx="16" fill="#0f3617" stroke="#2b7a3a" stroke-width="1.5"/>
  <text x="600" y="580" font-size="36">💧</text>
  <text x="660" y="575" font-size="26" font-weight="700" fill="white">NDMI</text>
  <text x="660" y="612" font-size="16" fill="#6aaa78">Agua en hoja</text>

  <!-- Row 2 -->
  <!-- Box 3: Humedad -->
  <rect x="60" y="710" width="460" height="180" rx="16" fill="#0f3617" stroke="#2b7a3a" stroke-width="1.5"/>
  <text x="100" y="790" font-size="36">🌍</text>
  <text x="160" y="785" font-size="24" font-weight="700" fill="white">Humedad suelo</text>
  <text x="160" y="822" font-size="16" fill="#6aaa78">3 capas de profundidad</text>

  <!-- Box 4: Clima -->
  <rect x="560" y="710" width="460" height="180" rx="16" fill="#0f3617" stroke="#2b7a3a" stroke-width="1.5"/>
  <text x="600" y="790" font-size="36">🌤</text>
  <text x="660" y="785" font-size="26" font-weight="700" fill="white">Clima</text>
  <text x="660" y="822" font-size="16" fill="#6aaa78">DWD ICON, hora a hora</text>

  <!-- Row 3 -->
  <!-- Box 5: Alertas -->
  <rect x="60" y="920" width="460" height="180" rx="16" fill="#0f3617" stroke="#2b7a3a" stroke-width="1.5"/>
  <text x="100" y="1000" font-size="36">🔔</text>
  <text x="160" y="995" font-size="26" font-weight="700" fill="white">Alertas</text>
  <text x="160" y="1032" font-size="16" fill="#6aaa78">Automáticas e instantáneas</text>

  <!-- Box 6: Historico -->
  <rect x="560" y="920" width="460" height="180" rx="16" fill="#0f3617" stroke="#2b7a3a" stroke-width="1.5"/>
  <text x="600" y="1000" font-size="36">📊</text>
  <text x="660" y="995" font-size="26" font-weight="700" fill="white">Histórico</text>
  <text x="660" y="1032" font-size="16" fill="#6aaa78">56 días de datos</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
