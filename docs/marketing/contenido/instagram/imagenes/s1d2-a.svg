<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Very clean dark background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Subtle grid suggestion -->
  <rect x="0" y="0" width="1080" height="1350" fill="none" stroke="#0f3617" stroke-width="0.5" opacity="0.3"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Large X indicators and bold text blocks -->
  <!-- Block 1: SIN SENSORES -->
  <rect x="0" y="280" width="1080" height="160" fill="#0f3617" opacity="0.3"/>
  <line x1="60" y1="300" x2="110" y2="360" stroke="#5eb169" stroke-width="5" opacity="0.5"/>
  <line x1="110" y1="300" x2="60" y2="360" stroke="#5eb169" stroke-width="5" opacity="0.5"/>
  <text x="150" y="380" font-size="74" font-weight="900" fill="white" letter-spacing="-1">SIN SENSORES.</text>

  <!-- Block 2: SIN INSTALACIONES -->
  <rect x="0" y="500" width="1080" height="160" fill="#0f3617" opacity="0.2"/>
  <line x1="60" y1="520" x2="110" y2="580" stroke="#5eb169" stroke-width="5" opacity="0.5"/>
  <line x1="110" y1="520" x2="60" y2="580" stroke="#5eb169" stroke-width="5" opacity="0.5"/>
  <text x="150" y="600" font-size="74" font-weight="900" fill="white" letter-spacing="-1">SIN INSTALACIONES.</text>

  <!-- Block 3: SIN COMPLICACIONES (accent color) -->
  <rect x="0" y="720" width="1080" height="160" fill="#1a4d24" opacity="0.3"/>
  <line x1="60" y1="740" x2="110" y2="800" stroke="#a8d894" stroke-width="5" opacity="0.6"/>
  <line x1="110" y1="740" x2="60" y2="800" stroke="#a8d894" stroke-width="5" opacity="0.6"/>
  <text x="150" y="820" font-size="74" font-weight="900" fill="#a8d894" letter-spacing="-1">SIN COMPLICACIONES.</text>

  <!-- Divider -->
  <rect x="72" y="950" width="936" height="2" fill="#2b7a3a"/>

  <!-- Subtext -->
  <text x="72" y="1030" font-size="24" fill="#6aaa78">Solo necesitas la referencia SIGPAC.</text>
  <text x="72" y="1080" font-size="20" fill="#6aaa78" opacity="0.7">El satélite hace el resto.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
