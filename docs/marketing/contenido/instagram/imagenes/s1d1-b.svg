<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Subtle texture lines -->
  <line x1="0" y1="200" x2="1080" y2="200" stroke="#0f3617" stroke-width="1"/>
  <line x1="0" y1="400" x2="1080" y2="400" stroke="#0f3617" stroke-width="1"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Content block -->
  <text x="72" y="280" font-size="28" font-weight="600" fill="#a8d894">Kylia te da:</text>

  <!-- Divider line -->
  <rect x="72" y="310" width="120" height="3" fill="#5eb169" rx="2"/>

  <!-- Bullet items -->
  <text x="72" y="430" font-size="24" fill="white" font-weight="500">✓  Decisiones más inteligentes</text>
  <text x="72" y="520" font-size="24" fill="white" font-weight="500">✓  Ahorro de agua y fertilizantes</text>
  <text x="72" y="610" font-size="24" fill="white" font-weight="500">✓  Más rendimiento y rentabilidad</text>
  <text x="72" y="700" font-size="24" fill="white" font-weight="500">✓  Sostenibilidad medible</text>

  <!-- Separator -->
  <rect x="72" y="780" width="936" height="1" fill="#1a4d24"/>

  <!-- Supporting text -->
  <text x="72" y="870" font-size="20" fill="#6aaa78">Tecnología espacial europea. Para el agricultor de hoy.</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="500" height="80" rx="40" fill="#2b7a3a"/>
  <text x="322" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza gratis → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
