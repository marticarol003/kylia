<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050f08"/>
      <stop offset="100%" style="stop-color:#0f2a14"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#050f08;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#050f08;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- More abstract aerial fields - strong perspective -->
  <path d="M -100 600 L 1180 400 L 1180 700 L -100 800 Z" fill="#2b7a3a" opacity="0.45"/>
  <path d="M -100 350 L 800 200 L 820 450 L -80 550 Z" fill="#1f5a2b" opacity="0.6"/>
  <path d="M 780 180 L 1180 220 L 1160 460 L 800 440 Z" fill="#3a8c48" opacity="0.5"/>
  <path d="M -100 750 L 600 700 L 620 950 L -80 980 Z" fill="#1a4d24" opacity="0.5"/>
  <path d="M 580 680 L 1180 700 L 1160 950 L 560 940 Z" fill="#2b7a3a" opacity="0.4"/>
  <path d="M 100 950 L 1080 920 L 1060 1100 L 80 1120 Z" fill="#0f3617" opacity="0.6"/>

  <!-- Satellite orbit circle (small circle upper area) -->
  <circle cx="900" cy="130" r="28" fill="none" stroke="#a8d894" stroke-width="2" opacity="0.7"/>
  <circle cx="900" cy="130" r="8" fill="#a8d894" opacity="0.8"/>
  <text x="942" y="136" font-size="14" fill="#a8d894" opacity="0.8">Sentinel-2</text>
  <!-- Orbit arc -->
  <path d="M 840 105 Q 900 60 960 105" fill="none" stroke="#a8d894" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Dark overlay for text -->
  <rect x="0" y="660" width="1080" height="690" fill="url(#fadeBottom)"/>
  <rect x="0" y="820" width="1080" height="530" fill="#050f08" opacity="0.82"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Main headline -->
  <text x="72" y="870" font-size="74" font-weight="900" fill="white" letter-spacing="-2">TU EXPLOTACIÓN,</text>
  <text x="72" y="958" font-size="74" font-weight="900" fill="white" letter-spacing="-2">VISTA DESDE</text>
  <text x="72" y="1046" font-size="74" font-weight="900" fill="#a8d894" letter-spacing="-2">OTRA PERSPECTIVA.</text>

  <!-- Subtext -->
  <text x="72" y="1120" font-size="21" fill="#a8d894">786 km de altura. 10 m de resolución.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
