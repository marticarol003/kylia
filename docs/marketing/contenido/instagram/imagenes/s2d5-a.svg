<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Stacked notification cards (phone screen simulation) -->
  <!-- Card 3 (back) - most faded -->
  <rect x="200" y="230" width="740" height="110" rx="16" fill="#1a4d24" opacity="0.5" transform="translate(0, 20) rotate(-1, 540, 285)"/>

  <!-- Card 2 (middle) -->
  <rect x="160" y="270" width="760" height="120" rx="16" fill="#0f3617" opacity="0.8"/>
  <text x="200" y="320" font-size="17" fill="#a8d894">✓  NDVI estable en todas las parcelas</text>
  <text x="200" y="356" font-size="14" fill="#6aaa78">Kylia · Hace 2 horas</text>

  <!-- Card 1 (front, prominent) -->
  <rect x="120" y="320" width="840" height="140" rx="20" fill="white" opacity="0.97"/>
  <rect x="120" y="320" width="840" height="46" rx="20" fill="#1a4d24"/>
  <rect x="120" y="350" width="840" height="16" fill="#1a4d24"/>
  <text x="160" y="352" font-size="16" font-weight="700" fill="white">⚠  Kylia</text>
  <text x="160" y="395" font-size="20" font-weight="700" fill="#071c0c">NDMI bajo en parcela norte</text>
  <text x="160" y="430" font-size="16" fill="#555">Estrés hídrico detectado · Ahora</text>

  <!-- Card 3 (below) -->
  <rect x="140" y="480" width="800" height="120" rx="16" fill="#0f2a14" opacity="0.75"/>
  <text x="180" y="528" font-size="17" fill="#6aaa78">💧  Humedad capa 0-7cm: 18%</text>
  <text x="180" y="562" font-size="14" fill="#4a7a56">Kylia · Hace 5 horas</text>

  <!-- Headline -->
  <text x="72" y="720" font-size="62" font-weight="900" fill="white" letter-spacing="-1">ALERTAS</text>
  <text x="72" y="800" font-size="62" font-weight="900" fill="white" letter-spacing="-1">PERSONALIZADAS.</text>
  <text x="72" y="880" font-size="62" font-weight="900" fill="#a8d894" letter-spacing="-1">CUANDO Y DONDE</text>
  <text x="72" y="960" font-size="62" font-weight="900" fill="#a8d894" letter-spacing="-1">LAS NECESITAS.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
