<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="28" font-weight="600" fill="#a8d894">Kylia trabaja mientras tú descansas:</text>
  <rect x="72" y="284" width="240" height="3" fill="#5eb169" rx="2"/>

  <!-- Bullet list -->
  <rect x="60" y="340" width="960" height="86" rx="12" fill="#0f3617" opacity="0.5"/>
  <text x="100" y="392" font-size="23" fill="white" font-weight="500">→  Pasa cada 5 días sobre tu campo</text>

  <rect x="60" y="446" width="960" height="86" rx="12" fill="#0f3617" opacity="0.5"/>
  <text x="100" y="498" font-size="23" fill="white" font-weight="500">→  Filtra nubes automáticamente</text>

  <rect x="60" y="552" width="960" height="86" rx="12" fill="#0f3617" opacity="0.5"/>
  <text x="100" y="604" font-size="23" fill="white" font-weight="500">→  Calcula índices por cada parcela</text>

  <rect x="60" y="658" width="960" height="86" rx="12" fill="#0f3617" opacity="0.5"/>
  <text x="100" y="710" font-size="23" fill="white" font-weight="500">→  Te alerta solo cuando hay algo</text>

  <!-- Separator -->
  <rect x="72" y="810" width="936" height="1" fill="#1a4d24"/>

  <!-- Trust line -->
  <text x="72" y="890" font-size="19" fill="#6aaa78">Infraestructura pública europea. Siempre disponible.</text>
  <text x="72" y="930" font-size="18" fill="#6aaa78" opacity="0.7">Copernicus · ESA · Sin dependencia privada</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza gratis → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
