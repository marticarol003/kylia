<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Headline -->
  <text x="72" y="240" font-size="32" font-weight="700" fill="white">¿Por qué importa la capa correcta?</text>
  <rect x="72" y="264" width="220" height="3" fill="#5eb169" rx="2"/>

  <!-- Use case blocks -->
  <rect x="60" y="310" width="960" height="160" rx="16" fill="#0f3617" opacity="0.7"/>
  <rect x="60" y="310" width="8" height="160" rx="4" fill="#5eb169"/>
  <text x="100" y="380" font-size="22" font-weight="700" fill="white">Olivar en goteo</text>
  <text x="100" y="416" font-size="19" fill="#a8d894">→ capa 0–30 cm</text>
  <text x="100" y="450" font-size="16" fill="#6aaa78">Sistema radicular superficial, riego localizado</text>

  <rect x="60" y="500" width="960" height="160" rx="16" fill="#0f3617" opacity="0.7"/>
  <rect x="60" y="500" width="8" height="160" rx="4" fill="#a8d894"/>
  <text x="100" y="570" font-size="22" font-weight="700" fill="white">Cereal de secano</text>
  <text x="100" y="606" font-size="19" fill="#a8d894">→ capa 28–100 cm</text>
  <text x="100" y="640" font-size="16" fill="#6aaa78">Depende de la reserva hídrica profunda</text>

  <!-- Warning text -->
  <rect x="60" y="700" width="960" height="120" rx="16" fill="#2a1a08" opacity="0.8"/>
  <rect x="60" y="700" width="8" height="120" rx="4" fill="#d4a82a"/>
  <text x="100" y="760" font-size="21" font-weight="600" fill="#d4a82a">Mirar la capa equivocada</text>
  <text x="100" y="796" font-size="21" font-weight="600" fill="#d4a82a">= falsa tranquilidad.</text>

  <!-- Separator -->
  <rect x="72" y="870" width="936" height="1" fill="#1a4d24"/>

  <!-- Bold statement in yellow -->
  <text x="72" y="960" font-size="26" font-weight="800" fill="#d4a82a">Kylia monitoriza las 3. Automáticamente.</text>
  <text x="72" y="1010" font-size="19" fill="#6aaa78">Sin que tengas que saber cuál elegir.</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Ver humedad → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
