<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="28" font-weight="600" fill="#a8d894">Kylia funciona para:</text>
  <rect x="72" y="284" width="140" height="3" fill="#5eb169" rx="2"/>

  <!-- 4 user types -->
  <rect x="60" y="320" width="960" height="130" rx="16" fill="#0f3617" opacity="0.7"/>
  <text x="110" y="375" font-size="36">🌿</text>
  <text x="170" y="372" font-size="23" font-weight="700" fill="white">Agricultores individuales</text>
  <text x="170" y="408" font-size="17" fill="#6aaa78">Desde 1 parcela. Free hasta 30 ha.</text>

  <rect x="60" y="470" width="960" height="130" rx="16" fill="#0f3617" opacity="0.7"/>
  <text x="110" y="525" font-size="36">🏘</text>
  <text x="170" y="522" font-size="23" font-weight="700" fill="white">Cooperativas olivareras</text>
  <text x="170" y="558" font-size="17" fill="#6aaa78">Gestión centralizada de todos los socios.</text>

  <rect x="60" y="620" width="960" height="130" rx="16" fill="#0f3617" opacity="0.7"/>
  <text x="110" y="675" font-size="36">🌾</text>
  <text x="170" y="672" font-size="23" font-weight="700" fill="white">Explotaciones cerealistas</text>
  <text x="170" y="708" font-size="17" fill="#6aaa78">Humedad profunda para cereal de secano.</text>

  <rect x="60" y="770" width="960" height="130" rx="16" fill="#0f3617" opacity="0.7"/>
  <text x="110" y="825" font-size="36">🍇</text>
  <text x="170" y="822" font-size="23" font-weight="700" fill="white">Viticultores y fruticultores</text>
  <text x="170" y="858" font-size="17" fill="#6aaa78">NDVI y estrés hídrico por parcela.</text>

  <!-- Separator -->
  <rect x="72" y="960" width="936" height="1" fill="#1a4d24"/>

  <!-- Yellow bold statement -->
  <text x="72" y="1050" font-size="26" font-weight="800" fill="#d4a82a">Si tienes una parcela SIGPAC, tienes Kylia.</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza gratis → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
