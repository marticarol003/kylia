<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1c08"/>
      <stop offset="100%" style="stop-color:#1a1206"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1c08;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0e1c08;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background - warm earthy -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Golden light field shapes -->
  <path d="M -60 250 L 620 160 L 660 500 L -40 560 Z" fill="#4a7a1a" opacity="0.6"/>
  <path d="M 600 150 L 1160 200 L 1130 540 L 640 490 Z" fill="#c8a040" opacity="0.2"/>
  <path d="M -60 500 L 500 470 L 540 720 L -40 740 Z" fill="#3a6e20" opacity="0.55"/>
  <path d="M 480 460 L 1160 500 L 1140 750 L 460 730 Z" fill="#2b5a18" opacity="0.45"/>
  <path d="M 80 700 L 1100 680 L 1080 920 L 60 940 Z" fill="#1a3c10" opacity="0.7"/>
  <!-- Golden morning highlight -->
  <path d="M -100 200 L 1200 130 L 1200 260 L -100 310 Z" fill="#d4a82a" opacity="0.08"/>

  <!-- Dark overlay for text -->
  <rect x="0" y="640" width="1080" height="710" fill="url(#fadeBottom)"/>
  <rect x="0" y="810" width="1080" height="540" fill="#0e1c08" opacity="0.82"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Giant headline -->
  <text x="72" y="860" font-size="90" font-weight="900" fill="white" letter-spacing="-2">PARA</text>
  <text x="72" y="960" font-size="90" font-weight="900" fill="white" letter-spacing="-2">AGRICULTORES</text>
  <text x="72" y="1060" font-size="90" font-weight="900" fill="#a8d894" letter-spacing="-2">COMO TÚ.</text>

  <!-- Subtext -->
  <text x="72" y="1150" font-size="21" fill="#a8d894">Kylia está hecho para quien trabaja el campo,</text>
  <text x="72" y="1185" font-size="21" fill="#a8d894">no para quien estudia el satélite.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
