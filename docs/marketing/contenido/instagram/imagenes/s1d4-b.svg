<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="28" font-weight="600" fill="#a8d894">La alerta significa:</text>
  <rect x="72" y="284" width="160" height="3" fill="#5eb169" rx="2"/>

  <!-- Alert items -->
  <rect x="60" y="340" width="960" height="90" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="100" y="397" font-size="24" fill="white" font-weight="500">→  NDMI por debajo de 0,28</text>

  <rect x="60" y="450" width="960" height="90" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="100" y="507" font-size="24" fill="white" font-weight="500">→  Estrés hídrico temprano</text>

  <rect x="60" y="560" width="960" height="90" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="100" y="617" font-size="24" fill="white" font-weight="500">→  Actúa antes de que lo veas</text>

  <!-- Separator -->
  <rect x="72" y="710" width="936" height="1" fill="#1a4d24"/>

  <!-- Key stat in yellow -->
  <text x="72" y="810" font-size="30" font-weight="800" fill="#d4a82a">9 días de ventaja sobre el ojo humano.</text>

  <!-- Supporting text -->
  <text x="72" y="900" font-size="20" fill="#6aaa78">El satélite detecta lo que el ojo tardará en ver.</text>
  <text x="72" y="940" font-size="20" fill="#6aaa78">Actúa antes. Pierde menos. Gana más.</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Activa alertas → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
