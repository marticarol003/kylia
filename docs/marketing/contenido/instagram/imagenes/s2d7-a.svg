  <path d="M 540 780 C 540 780 310 580 310 430 C 310 345 380 280 460 280 C 500 280 540 305 540 305 C 540 305 580 280 620 280 C 700 280 770 345 770 430 C 770 580 540 780 540 780 Z" fill="#2b7a3a" opacity="0.25"/>

