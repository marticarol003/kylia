<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="26" font-weight="600" fill="#a8d894">Únete a la revolución del campo inteligente:</text>
  <rect x="72" y="284" width="280" height="3" fill="#5eb169" rx="2"/>

  <!-- Plan blocks -->
  <!-- Free -->
  <rect x="60" y="330" width="960" height="130" rx="16" fill="#0f3617" opacity="0.7"/>
  <rect x="60" y="330" width="8" height="130" rx="4" fill="#5eb169"/>
  <text x="110" y="390" font-size="28" font-weight="700" fill="white">Free</text>
  <text x="110" y="430" font-size="22" fill="#a8d894">Hasta 30 ha. Sin tarjeta. Sin trampa.</text>

  <!-- Productor -->
  <rect x="60" y="480" width="960" height="130" rx="16" fill="#0f3617" opacity="0.7"/>
  <rect x="60" y="480" width="8" height="130" rx="4" fill="#a8d894"/>
  <text x="110" y="540" font-size="28" font-weight="700" fill="white">Productor</text>
  <text x="110" y="580" font-size="22" fill="#a8d894">desde 99 €/año · Ilimitado</text>

  <!-- Cooperativa -->
  <rect x="60" y="630" width="960" height="130" rx="16" fill="#1a4d24" opacity="0.7"/>
  <rect x="60" y="630" width="8" height="130" rx="4" fill="#d4a82a"/>
  <text x="110" y="690" font-size="28" font-weight="700" fill="white">Cooperativa</text>
  <text x="110" y="730" font-size="22" fill="#d4a82a">desde 2.900 €/año · Socios ilimitados</text>

  <!-- Separator -->
  <rect x="72" y="820" width="936" height="1" fill="#1a4d24"/>

  <!-- Big CTA with green background box -->
  <rect x="60" y="890" width="960" height="130" rx="20" fill="#2b7a3a"/>
  <text x="540" y="947" font-size="30" font-weight="900" fill="white" text-anchor="middle">Empieza hoy</text>
  <text x="540" y="992" font-size="28" font-weight="700" fill="#a8d894" text-anchor="middle">→ kylia.app</text>

  <!-- Supporting text -->
  <text x="540" y="1100" font-size="19" fill="#6aaa78" text-anchor="middle">Sin tarjeta de crédito · Sin contratos anuales</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
