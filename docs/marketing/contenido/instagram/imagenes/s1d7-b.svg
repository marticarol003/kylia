<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="30" font-weight="600" fill="#a8d894">7 días a la semana:</text>
  <rect x="72" y="284" width="160" height="3" fill="#5eb169" rx="2"/>

  <!-- Three benefit blocks -->
  <rect x="60" y="340" width="960" height="110" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="100" y="395" font-size="22" fill="white" font-weight="600">Cada 5 días una nueva imagen de tus parcelas.</text>
  <text x="100" y="430" font-size="18" fill="#6aaa78">Sentinel-2. Automático. Sin que hagas nada.</text>

  <rect x="60" y="470" width="960" height="110" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="100" y="525" font-size="22" fill="white" font-weight="600">Histórico de 56 días siempre disponible.</text>
  <text x="100" y="560" font-size="18" fill="#6aaa78">Sigue la evolución de tu campaña.</text>

  <rect x="60" y="600" width="960" height="110" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="100" y="655" font-size="22" fill="white" font-weight="600">Alertas automáticas en cualquier momento.</text>
  <text x="100" y="690" font-size="18" fill="#6aaa78">NDVI, NDMI, humedad. Siempre vigilado.</text>

  <!-- Separator -->
  <rect x="72" y="790" width="936" height="1" fill="#1a4d24"/>

  <!-- Big CTA text -->
  <text x="72" y="890" font-size="50" font-weight="900" fill="white" letter-spacing="-1">Pruébalo.</text>
  <text x="72" y="960" font-size="50" font-weight="900" fill="#a8d894" letter-spacing="-1">Es gratis.</text>

  <!-- Free note -->
  <text x="72" y="1060" font-size="20" fill="#6aaa78">Free hasta 30 ha · Sin tarjeta</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza en kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
