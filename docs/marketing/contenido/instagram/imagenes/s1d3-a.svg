<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#071c0c"/>
      <stop offset="100%" style="stop-color:#0a2410"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#071c0c;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#071c0c;stop-opacity:0.92"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Field shapes with NDVI variation -->
  <!-- Healthy green fields -->
  <path d="M -40 200 L 500 150 L 560 500 L -20 530 Z" fill="#2b7a3a" opacity="0.75"/>
  <path d="M 480 140 L 1100 180 L 1080 520 L 500 490 Z" fill="#1f5a2b" opacity="0.8"/>
  <!-- Stressed field (orange/yellow = NDVI stress) -->
  <path d="M 200 480 L 700 460 L 720 700 L 180 720 Z" fill="#c8a040" opacity="0.6"/>
  <path d="M 680 470 L 1100 500 L 1090 750 L 660 730 Z" fill="#d4a82a" opacity="0.45"/>
  <!-- Lower fields healthy again -->
  <path d="M -60 680 L 300 660 L 310 900 L -50 910 Z" fill="#3a8c48" opacity="0.55"/>
  <path d="M 280 650 L 760 630 L 780 880 L 260 900 Z" fill="#2b7a3a" opacity="0.5"/>

  <!-- Crop rows suggestion -->
  <line x1="-40" y1="230" x2="560" y2="180" stroke="#5eb169" stroke-width="1.5" opacity="0.15"/>
  <line x1="-40" y1="270" x2="560" y2="220" stroke="#5eb169" stroke-width="1.5" opacity="0.15"/>
  <line x1="-40" y1="310" x2="560" y2="260" stroke="#5eb169" stroke-width="1.5" opacity="0.15"/>
  <line x1="-40" y1="350" x2="560" y2="300" stroke="#5eb169" stroke-width="1.5" opacity="0.15"/>

  <!-- NDVI stress label -->
  <rect x="220" y="530" width="160" height="36" rx="8" fill="#c8a040" opacity="0.9"/>
  <text x="300" y="555" font-size="16" font-weight="700" fill="#071c0c" text-anchor="middle">⚠ Estrés detectado</text>

  <!-- Dark overlay for text -->
  <rect x="0" y="650" width="1080" height="700" fill="url(#fadeBottom)"/>
  <rect x="0" y="800" width="1080" height="550" fill="#071c0c" opacity="0.85"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Main headline -->
  <text x="72" y="850" font-size="64" font-weight="900" fill="white" letter-spacing="-1">Cada parcela</text>
  <text x="72" y="930" font-size="64" font-weight="900" fill="white" letter-spacing="-1">tiene su historia.</text>
  <text x="72" y="1010" font-size="64" font-weight="900" fill="#a8d894" letter-spacing="-1">Nosotros la</text>
  <text x="72" y="1090" font-size="64" font-weight="900" fill="#a8d894" letter-spacing="-1">interpretamos.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
