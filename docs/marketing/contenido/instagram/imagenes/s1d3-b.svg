<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="30" font-weight="600" fill="#a8d894">Cada 5 días:</text>
  <rect x="72" y="284" width="110" height="3" fill="#5eb169" rx="2"/>

  <!-- 3 data cards side by side -->
  <!-- Card 1: NDVI -->
  <rect x="60" y="340" width="300" height="260" rx="16" fill="#0f3617"/>
  <rect x="60" y="340" width="300" height="4" rx="2" fill="#5eb169"/>
  <text x="210" y="430" font-size="22" font-weight="600" fill="#a8d894" text-anchor="middle">NDVI</text>
  <text x="210" y="530" font-size="64" font-weight="900" fill="white" text-anchor="middle">0,72</text>
  <text x="210" y="580" font-size="16" fill="#6aaa78" text-anchor="middle">Vigor vegetativo</text>

  <!-- Card 2: NDMI -->
  <rect x="390" y="340" width="300" height="260" rx="16" fill="#0f3617"/>
  <rect x="390" y="340" width="300" height="4" rx="2" fill="#d4a82a"/>
  <text x="540" y="430" font-size="22" font-weight="600" fill="#a8d894" text-anchor="middle">NDMI</text>
  <text x="540" y="530" font-size="64" font-weight="900" fill="#d4a82a" text-anchor="middle">0,26</text>
  <text x="540" y="580" font-size="16" fill="#6aaa78" text-anchor="middle">Agua en hoja</text>

  <!-- Card 3: Humedad -->
  <rect x="720" y="340" width="300" height="260" rx="16" fill="#0f3617"/>
  <rect x="720" y="340" width="300" height="4" rx="2" fill="#a8d894"/>
  <text x="870" y="430" font-size="22" font-weight="600" fill="#a8d894" text-anchor="middle">Humedad</text>
  <text x="870" y="530" font-size="64" font-weight="900" fill="white" text-anchor="middle">32%</text>
  <text x="870" y="580" font-size="16" fill="#6aaa78" text-anchor="middle">Suelo 0–7 cm</text>

  <!-- Separator -->
  <rect x="72" y="680" width="936" height="1" fill="#1a4d24"/>

  <!-- Explanation text -->
  <text x="72" y="770" font-size="22" fill="white" font-weight="500">Tres índices. Una imagen completa de tu campo.</text>
  <text x="72" y="820" font-size="20" fill="#6aaa78">Actualizado con cada paso de Sentinel-2.</text>

  <!-- Data sources -->
  <rect x="72" y="920" width="700" height="50" rx="10" fill="#1a4d24" opacity="0.5"/>
  <text x="422" y="953" font-size="16" fill="#6aaa78" text-anchor="middle">Sentinel-2  ·  SIGPAC  ·  DWD ICON</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Ver mis parcelas → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
