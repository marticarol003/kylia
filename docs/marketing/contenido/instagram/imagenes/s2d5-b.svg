<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="26" font-weight="600" fill="#a8d894">Incluido en todos los planes:</text>
  <rect x="72" y="284" width="200" height="3" fill="#5eb169" rx="2"/>

  <!-- 4 alert types -->
  <rect x="60" y="320" width="960" height="100" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="110" y="363" font-size="22" fill="white" font-weight="600">⚠  Alerta NDMI bajo</text>
  <text x="110" y="397" font-size="16" fill="#6aaa78">Detecta estrés hídrico antes que el ojo humano</text>

  <rect x="60" y="440" width="960" height="100" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="110" y="483" font-size="22" fill="white" font-weight="600">📉  Alerta NDVI crítico</text>
  <text x="110" y="517" font-size="16" fill="#6aaa78">Descenso de vigor vegetativo fuera de lo normal</text>

  <rect x="60" y="560" width="960" height="100" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="110" y="603" font-size="22" fill="white" font-weight="600">💧  Alerta humedad suelo</text>
  <text x="110" y="637" font-size="16" fill="#6aaa78">Por capas: 0–7, 7–28, 28–100 cm</text>

  <rect x="60" y="680" width="960" height="100" rx="12" fill="#0f3617" opacity="0.6"/>
  <text x="110" y="723" font-size="22" fill="white" font-weight="600">🌧  Alerta meteorológica</text>
  <text x="110" y="757" font-size="16" fill="#6aaa78">Temperatura extrema, lluvia esperada, heladas</text>

  <!-- Separator -->
  <rect x="72" y="840" width="936" height="1" fill="#1a4d24"/>

  <!-- Bold statement -->
  <text x="72" y="930" font-size="25" font-weight="700" fill="white">Solo te avisamos cuando hay algo que hacer.</text>

  <!-- Supporting text -->
  <text x="72" y="990" font-size="20" fill="#6aaa78">Sin spam. Sin ruido. Solo el dato relevante.</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Activa alertas → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
