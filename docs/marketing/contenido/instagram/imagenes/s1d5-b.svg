<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Big headline -->
  <text x="72" y="260" font-size="88" font-weight="900" fill="white" letter-spacing="-3">En una</text>
  <text x="72" y="360" font-size="88" font-weight="900" fill="#a8d894" letter-spacing="-3">sola app.</text>

  <!-- Separator -->
  <rect x="72" y="400" width="936" height="2" fill="#1a4d24"/>

  <!-- Supporting text -->
  <text x="72" y="470" font-size="22" fill="#6aaa78">Sin instalar nada. Sin sensores. Sin contratos anuales obligatorios.</text>

  <!-- Pricing section -->
  <text x="72" y="560" font-size="24" font-weight="600" fill="#a8d894">Planes:</text>

  <!-- Free plan -->
  <rect x="60" y="590" width="300" height="200" rx="16" fill="#0f3617"/>
  <rect x="60" y="590" width="300" height="5" rx="2" fill="#5eb169"/>
  <text x="210" y="660" font-size="22" font-weight="700" fill="white" text-anchor="middle">Free</text>
  <text x="210" y="720" font-size="46" font-weight="900" fill="#a8d894" text-anchor="middle">0€</text>
  <text x="210" y="765" font-size="15" fill="#6aaa78" text-anchor="middle">Hasta 30 ha</text>

  <!-- Producer plan -->
  <rect x="390" y="590" width="300" height="200" rx="16" fill="#0f3617"/>
  <rect x="390" y="590" width="300" height="5" rx="2" fill="#a8d894"/>
  <text x="540" y="660" font-size="22" font-weight="700" fill="white" text-anchor="middle">Productor</text>
  <text x="540" y="720" font-size="38" font-weight="900" fill="white" text-anchor="middle">99€/año</text>
  <text x="540" y="765" font-size="15" fill="#6aaa78" text-anchor="middle">Ilimitado</text>

  <!-- Cooperative plan -->
  <rect x="720" y="590" width="300" height="200" rx="16" fill="#1a4d24"/>
  <rect x="720" y="590" width="300" height="5" rx="2" fill="#d4a82a"/>
  <text x="870" y="660" font-size="22" font-weight="700" fill="white" text-anchor="middle">Cooperativa</text>
  <text x="870" y="715" font-size="30" font-weight="900" fill="#d4a82a" text-anchor="middle">2.900€/año</text>
  <text x="870" y="760" font-size="15" fill="#6aaa78" text-anchor="middle">Socios ilimitados</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza gratis → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
