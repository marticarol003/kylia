<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#071c0c"/>
      <stop offset="100%" style="stop-color:#0a2410"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Field shapes - aerial crop view -->
  <path d="M -60 300 L 600 200 L 680 600 L -40 680 Z" fill="#2b7a3a" opacity="0.7"/>
  <path d="M 580 190 L 1140 240 L 1100 600 L 620 580 Z" fill="#1f5a2b" opacity="0.8"/>
  <path d="M 100 640 L 900 600 L 980 900 L 60 920 Z" fill="#3a8c48" opacity="0.5"/>
  <path d="M -80 820 L 200 780 L 280 980 L -60 1000 Z" fill="#1a4d24" opacity="0.6"/>
  <path d="M 750 700 L 1140 660 L 1120 920 L 720 950 Z" fill="#2b7a3a" opacity="0.45"/>

  <!-- Crop row lines suggestion -->
  <line x1="-60" y1="330" x2="680" y2="230" stroke="#5eb169" stroke-width="1" opacity="0.2"/>
  <line x1="-60" y1="360" x2="680" y2="260" stroke="#5eb169" stroke-width="1" opacity="0.2"/>
  <line x1="-60" y1="390" x2="680" y2="290" stroke="#5eb169" stroke-width="1" opacity="0.2"/>
  <line x1="-60" y1="420" x2="680" y2="320" stroke="#5eb169" stroke-width="1" opacity="0.2"/>
  <line x1="-60" y1="450" x2="680" y2="350" stroke="#5eb169" stroke-width="1" opacity="0.2"/>

  <!-- Dark overlay bottom 45% for text readability -->
  <rect x="0" y="700" width="1080" height="650" fill="#071c0c" opacity="0.88"/>
  <rect x="0" y="600" width="1080" height="120" fill="url(#fadeOverlay)"/>

  <!-- Additional gradient fade -->
  <defs>
    <linearGradient id="fadeOverlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#071c0c;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#071c0c;stop-opacity:0.88"/>
    </linearGradient>
  </defs>
  <rect x="0" y="580" width="1080" height="150" fill="url(#fadeOverlay)"/>

  <!-- Top left branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Main headline -->
  <text x="72" y="820" font-size="84" font-weight="900" fill="white" letter-spacing="-2">LA AGRICULTURA</text>
  <text x="72" y="920" font-size="84" font-weight="900" fill="white" letter-spacing="-2">DEL FUTURO</text>
  <text x="72" y="1020" font-size="84" font-weight="900" fill="white" letter-spacing="-2">YA ESTÁ AQUÍ.</text>

  <!-- Subtext -->
  <text x="72" y="1100" font-size="26" fill="#a8d894" font-weight="400">Decisiones inteligentes desde el espacio.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
