<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Soil layer visualization -->
  <!-- Layer labels on left -->
  <text x="72" y="230" font-size="18" fill="#a8d894" font-weight="600">Capas de suelo</text>

  <!-- Band 1: 0-7cm (top, darker green with blue tint) -->
  <rect x="60" y="260" width="960" height="170" rx="0" fill="#1a4d3a" opacity="0.9"/>
  <rect x="60" y="260" width="6" height="170" fill="#5eb169"/>
  <text x="100" y="330" font-size="19" font-weight="700" fill="#a8d894">0 — 7 cm</text>
  <text x="100" y="362" font-size="16" fill="#6aaa78">Capa superficial · Máxima humedad disponible</text>
  <!-- Moisture dots -->
  <circle cx="800" cy="345" r="6" fill="#5eb169" opacity="0.8"/>
  <circle cx="830" cy="345" r="6" fill="#5eb169" opacity="0.7"/>
  <circle cx="860" cy="345" r="6" fill="#5eb169" opacity="0.6"/>
  <circle cx="890" cy="345" r="6" fill="#5eb169" opacity="0.5"/>
  <circle cx="920" cy="345" r="6" fill="#5eb169" opacity="0.4"/>
  <circle cx="950" cy="345" r="6" fill="#5eb169" opacity="0.3"/>

  <!-- Band 2: 7-28cm (mid, medium green) -->
  <rect x="60" y="450" width="960" height="170" rx="0" fill="#1a4d24" opacity="0.8"/>
  <rect x="60" y="450" width="6" height="170" fill="#3a8c48"/>
  <text x="100" y="520" font-size="19" font-weight="700" fill="white">7 — 28 cm</text>
  <text x="100" y="552" font-size="16" fill="#6aaa78">Capa radicular · Absorción activa cultivos</text>
  <circle cx="800" cy="535" r="6" fill="#3a8c48" opacity="0.8"/>
  <circle cx="830" cy="535" r="6" fill="#3a8c48" opacity="0.6"/>
  <circle cx="860" cy="535" r="6" fill="#3a8c48" opacity="0.5"/>
  <circle cx="890" cy="535" r="6" fill="#3a8c48" opacity="0.3"/>
  <circle cx="920" cy="535" r="6" fill="#3a8c48" opacity="0.15"/>

  <!-- Band 3: 28-100cm (bottom, dark, dry) -->
  <rect x="60" y="640" width="960" height="170" rx="0" fill="#0f2210" opacity="0.9"/>
  <rect x="60" y="640" width="6" height="170" fill="#1a4d24"/>
  <text x="100" y="710" font-size="19" font-weight="700" fill="#6aaa78">28 — 100 cm</text>
  <text x="100" y="742" font-size="16" fill="#4a7a56">Capa profunda · Reserva hídrica del suelo</text>
  <circle cx="800" cy="725" r="6" fill="#1a4d24" opacity="0.5"/>
  <circle cx="830" cy="725" r="6" fill="#1a4d24" opacity="0.3"/>

  <!-- Separator -->
  <rect x="72" y="860" width="936" height="1" fill="#1a4d24"/>

  <!-- Main headline -->
  <text x="72" y="950" font-size="62" font-weight="900" fill="white" letter-spacing="-1">HUMEDAD DEL</text>
  <text x="72" y="1030" font-size="62" font-weight="900" fill="white" letter-spacing="-1">SUELO POR CAPAS.</text>
  <text x="72" y="1110" font-size="62" font-weight="900" fill="#a8d894" letter-spacing="-1">INFORMACIÓN QUE</text>
  <text x="72" y="1190" font-size="62" font-weight="900" fill="#a8d894" letter-spacing="-1">CAMBIA TODO.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
