<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="28" font-weight="600" fill="#a8d894">Tu campaña, con datos:</text>
  <rect x="72" y="284" width="160" height="3" fill="#5eb169" rx="2"/>

  <!-- Timeline visual -->
  <rect x="72" y="420" width="936" height="4" fill="#2b7a3a" rx="2"/>

  <!-- Timeline points -->
  <!-- Point 1: Siembra -->
  <circle cx="180" cy="422" r="14" fill="#5eb169"/>
  <text x="180" y="480" font-size="17" fill="#a8d894" text-anchor="middle">Siembra</text>
  <text x="180" y="504" font-size="13" fill="#6aaa78" text-anchor="middle">Inicio campaña</text>

  <!-- Point 2: Seguimiento -->
  <circle cx="440" cy="422" r="14" fill="#3a8c48"/>
  <text x="440" y="480" font-size="17" fill="#a8d894" text-anchor="middle">Seguimiento</text>
  <text x="440" y="504" font-size="13" fill="#6aaa78" text-anchor="middle">NDVI + humedad</text>

  <!-- Point 3: Alerta -->
  <circle cx="700" cy="422" r="14" fill="#d4a82a"/>
  <text x="700" y="480" font-size="17" fill="#d4a82a" text-anchor="middle">Alerta</text>
  <text x="700" y="504" font-size="13" fill="#6aaa78" text-anchor="middle">Estrés detectado</text>

  <!-- Point 4: Cosecha -->
  <circle cx="940" cy="422" r="14" fill="#a8d894"/>
  <text x="940" y="480" font-size="17" fill="#a8d894" text-anchor="middle">Cosecha</text>
  <text x="940" y="504" font-size="13" fill="#6aaa78" text-anchor="middle">Decisión informada</text>

  <!-- Bold statement -->
  <text x="72" y="620" font-size="26" font-weight="700" fill="white">Kylia te acompaña en cada fase.</text>

  <!-- Separator -->
  <rect x="72" y="680" width="936" height="1" fill="#1a4d24"/>

  <!-- Icons row for indices -->
  <rect x="60" y="730" width="220" height="80" rx="12" fill="#0f3617" opacity="0.7"/>
  <text x="170" y="778" font-size="17" fill="#a8d894" text-anchor="middle">NDVI</text>

  <rect x="300" y="730" width="220" height="80" rx="12" fill="#0f3617" opacity="0.7"/>
  <text x="410" y="778" font-size="17" fill="#a8d894" text-anchor="middle">NDMI</text>

  <rect x="540" y="730" width="220" height="80" rx="12" fill="#0f3617" opacity="0.7"/>
  <text x="650" y="778" font-size="17" fill="#a8d894" text-anchor="middle">Humedad</text>

  <rect x="780" y="730" width="240" height="80" rx="12" fill="#0f3617" opacity="0.7"/>
  <text x="900" y="778" font-size="17" fill="#a8d894" text-anchor="middle">Alertas</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza gratis → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
