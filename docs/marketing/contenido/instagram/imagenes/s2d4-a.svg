<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a06"/>
      <stop offset="100%" style="stop-color:#1a0c06"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a06;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0c1a06;stop-opacity:0.88"/>
    </linearGradient>
  </defs>

  <!-- Background - dawn/sunrise warm -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Dawn sky glow -->
  <ellipse cx="540" cy="300" rx="700" ry="250" fill="#d4a82a" opacity="0.08"/>
  <ellipse cx="540" cy="400" rx="500" ry="180" fill="#c8881a" opacity="0.06"/>

  <!-- Warm field shapes -->
  <path d="M -80 380 L 560 300 L 600 580 L -60 620 Z" fill="#3d6e1a" opacity="0.6"/>
  <path d="M 540 290 L 1160 340 L 1140 620 L 580 580 Z" fill="#c8881a" opacity="0.2"/>
  <path d="M -80 570 L 440 540 L 480 800 L -60 820 Z" fill="#2b7a3a" opacity="0.55"/>
  <path d="M 420 530 L 1160 560 L 1140 820 L 400 810 Z" fill="#1f5a2b" opacity="0.5"/>
  <path d="M 100 800 L 1080 780 L 1060 1020 L 80 1040 Z" fill="#0f3617" opacity="0.65"/>
  <!-- Amber highlight band (sunrise) -->
  <path d="M -100 310 L 1180 250 L 1180 340 L -100 380 Z" fill="#d4a82a" opacity="0.1"/>

  <!-- Dark overlay for text readability -->
  <rect x="0" y="680" width="1080" height="670" fill="url(#fadeBottom)"/>
  <rect x="0" y="850" width="1080" height="500" fill="#0c1a06" opacity="0.8"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Giant headline -->
  <text x="72" y="900" font-size="96" font-weight="900" fill="white" letter-spacing="-3">CULTIVA HOY</text>
  <text x="72" y="1010" font-size="96" font-weight="900" fill="#a8d894" letter-spacing="-3">EL MAÑANA.</text>

  <!-- Subtext -->
  <text x="72" y="1100" font-size="23" fill="#a8d894">El dato de hoy es la decisión de mañana.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
