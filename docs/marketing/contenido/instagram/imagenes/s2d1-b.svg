<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#071c0c"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Label -->
  <text x="72" y="260" font-size="28" font-weight="600" fill="#a8d894">Desde el espacio hasta tu móvil:</text>
  <rect x="72" y="284" width="220" height="3" fill="#5eb169" rx="2"/>

  <!-- 3 steps -->
  <!-- Step 1 -->
  <rect x="60" y="340" width="960" height="140" rx="16" fill="#0f3617" opacity="0.7"/>
  <circle cx="130" cy="410" r="38" fill="#2b7a3a"/>
  <text x="130" y="422" font-size="32" font-weight="900" fill="white" text-anchor="middle">1</text>
  <text x="200" y="400" font-size="24" font-weight="700" fill="white">Sentinel-2 captura</text>
  <text x="200" y="436" font-size="17" fill="#6aaa78">Imágenes multiespectrales cada 5 días</text>

  <!-- Step 2 -->
  <rect x="60" y="510" width="960" height="140" rx="16" fill="#0f3617" opacity="0.7"/>
  <circle cx="130" cy="580" r="38" fill="#2b7a3a"/>
  <text x="130" y="592" font-size="32" font-weight="900" fill="white" text-anchor="middle">2</text>
  <text x="200" y="570" font-size="24" font-weight="700" fill="white">Kylia procesa</text>
  <text x="200" y="606" font-size="17" fill="#6aaa78">NDVI, NDMI, humedad, alertas automáticas</text>

  <!-- Step 3 -->
  <rect x="60" y="680" width="960" height="140" rx="16" fill="#1a4d24" opacity="0.7"/>
  <circle cx="130" cy="750" r="38" fill="#5eb169"/>
  <text x="130" y="762" font-size="32" font-weight="900" fill="#071c0c" text-anchor="middle">3</text>
  <text x="200" y="740" font-size="24" font-weight="700" fill="white">Tú decides</text>
  <text x="200" y="776" font-size="17" fill="#a8d894">Con datos reales, en cualquier momento</text>

  <!-- Bold statement -->
  <text x="72" y="910" font-size="26" font-weight="700" fill="white">Cada 5 días. Automático. Sin que hagas nada.</text>

  <!-- CTA pill -->
  <rect x="72" y="1140" width="480" height="78" rx="39" fill="#2b7a3a"/>
  <text x="312" y="1191" font-size="24" font-weight="700" fill="white" text-anchor="middle">Empieza gratis → kylia.app</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">2 / 2</text>
</svg>
