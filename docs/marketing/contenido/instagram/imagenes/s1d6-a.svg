<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" font-family="-apple-system,Segoe UI,Inter,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1e0a"/>
      <stop offset="100%" style="stop-color:#1a1006"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1e0a;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0c1e0a;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background - warm/earthy -->
  <rect width="1080" height="1350" fill="url(#bgGrad)"/>

  <!-- Warm sunrise field shapes - amber tints -->
  <path d="M -60 180 L 550 120 L 620 480 L -30 520 Z" fill="#3a5e20" opacity="0.65"/>
  <path d="M 530 110 L 1140 160 L 1110 500 L 560 470 Z" fill="#c8881a" opacity="0.25"/>
  <path d="M -40 460 L 460 430 L 500 680 L -20 700 Z" fill="#4a7a28" opacity="0.55"/>
  <path d="M 440 420 L 1100 460 L 1080 720 L 420 700 Z" fill="#2b5a18" opacity="0.5"/>
  <!-- Warm amber highlight band (sunrise) -->
  <path d="M -80 300 L 1160 220 L 1160 380 L -80 440 Z" fill="#d4a82a" opacity="0.12"/>

  <!-- Crop row lines -->
  <line x1="-60" y1="210" x2="620" y2="150" stroke="#5eb169" stroke-width="1.5" opacity="0.12"/>
  <line x1="-60" y1="250" x2="620" y2="190" stroke="#5eb169" stroke-width="1.5" opacity="0.12"/>
  <line x1="-60" y1="290" x2="620" y2="230" stroke="#5eb169" stroke-width="1.5" opacity="0.12"/>
  <line x1="-60" y1="330" x2="620" y2="270" stroke="#a8d894" stroke-width="1" opacity="0.1"/>

  <!-- Dark overlay for text -->
  <rect x="0" y="620" width="1080" height="730" fill="url(#fadeBottom)"/>
  <rect x="0" y="780" width="1080" height="570" fill="#0c1e0a" opacity="0.82"/>

  <!-- Top branding -->
  <text x="48" y="68" font-size="28" font-weight="700" fill="white" opacity="0.9">Kylia®</text>

  <!-- Main headline -->
  <text x="72" y="830" font-size="76" font-weight="900" fill="white" letter-spacing="-2">Tecnología</text>
  <text x="72" y="920" font-size="76" font-weight="900" fill="white" letter-spacing="-2">para cuidar</text>
  <text x="72" y="1010" font-size="76" font-weight="900" fill="white" letter-spacing="-2">lo que más</text>
  <text x="72" y="1100" font-size="76" font-weight="900" fill="#a8d894" letter-spacing="-2">importa.</text>

  <!-- Subtext -->
  <text x="72" y="1170" font-size="23" fill="#a8d894">Tu campo. Tu trabajo. Tu legado.</text>

  <!-- Bottom branding -->
  <text x="72" y="1295" font-size="20" fill="#a8d894" font-weight="500">kylia.app</text>

  <!-- Pagination -->
  <text x="1008" y="1295" font-size="14" fill="#a8d894" opacity="0.5" text-anchor="end">1 / 2</text>
</svg>
