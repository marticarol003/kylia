<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Campo del padre · Kylia</title>
<meta name="theme-color" content="#013A27" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --verde:#013A27; --verde-700:#002518; --verde-900:#001710; --verde-50:#E7F1EC;
    --marron:#8a5a2b; --marron-50:#f3e9dd;
    --slate-900:#0f172a; --slate-700:#334155; --slate-500:#64748b; --slate-200:#e2e8f0; --slate-50:#f8fafc;
    --ambar:#b45309; --ambar-50:#fef3c7; --rojo:#9b3a3a; --rojo-50:#f7ebeb;
    --radius:18px; --shadow:0 8px 24px -8px rgba(15,23,42,0.18);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:"Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color:var(--slate-900); line-height:1.55; background:var(--slate-50);
    -webkit-font-smoothing:antialiased; padding:18px;
  }
  .app { max-width:520px; margin:0 auto; }
  .brand { display:flex; align-items:center; gap:8px; font-weight:800; color:var(--verde-900);
           letter-spacing:-0.02em; font-size:1.05rem; margin:6px 2px 14px; }
  .brand .dot { width:11px; height:11px; border-radius:50%; background:var(--verde); }
  h1 { font-size:1.5rem; color:var(--verde-900); letter-spacing:-0.02em; }
  .sub { color:var(--slate-500); font-size:0.92rem; margin-top:2px; }

  /* Navegación de pantallas */
  .nav { display:flex; gap:6px; background:#fff; border-radius:14px; padding:5px;
         box-shadow:var(--shadow); margin-bottom:6px; }
  .nav button { flex:1; padding:9px 6px; border:0; background:transparent; border-radius:10px;
                font-family:inherit; font-weight:700; font-size:0.82rem; color:var(--slate-500); cursor:pointer; }
  .nav button.on { background:var(--verde); color:#fff; }

  .card { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:26px 24px; margin-top:18px; }

  .estado { text-align:center; padding:34px 24px; border-radius:var(--radius); margin-top:18px; }
  .estado.baja  { background:var(--verde-50); }
  .estado.media { background:var(--ambar-50); }
  .estado.alta  { background:var(--rojo-50); }
  .estado .tag { display:inline-block; font-size:0.74rem; font-weight:700; letter-spacing:0.16em;
                 text-transform:uppercase; padding:5px 13px; border-radius:999px; }
  .estado.baja  .tag { background:var(--verde); color:#fff; }
  .estado.media .tag { background:var(--ambar); color:#fff; }
  .estado.alta  .tag { background:var(--rojo); color:#fff; }
  .estado .titular { font-size:2rem; font-weight:800; letter-spacing:-0.02em; margin:14px 0 6px; }
  .estado.baja  .titular { color:var(--verde-900); }
  .estado.media .titular { color:var(--ambar); }
  .estado.alta  .titular { color:var(--rojo); }
  .estado .porque { color:var(--slate-700); font-size:0.96rem; max-width:340px; margin:0 auto; }

  .chips { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:18px; }
  .chip { background:rgba(255,255,255,0.7); border:1px solid var(--slate-200); border-radius:999px;
          padding:6px 13px; font-size:0.82rem; color:var(--slate-700); font-weight:600; }

  .label { font-size:0.74rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
           color:var(--slate-500); margin-bottom:10px; }
  .next { display:flex; align-items:baseline; gap:8px; }
  .next .big { font-size:1.35rem; font-weight:800; color:var(--verde-900); }
  .hist { list-style:none; }
  .hist li { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--slate-200);
             font-size:0.92rem; }
  .hist li:last-child { border-bottom:0; }
  .hist .f { color:var(--slate-500); }
  .hist .v { font-weight:700; color:var(--verde-900); }

  /* Porqué de hoy: barra "hucha de agua" + desglose */
  .gauge { position:relative; height:26px; background:var(--verde-50); border-radius:8px; overflow:hidden; margin:4px 0 6px; }
  .gauge .fill { position:absolute; left:0; top:0; bottom:0; border-radius:8px 0 0 8px; transition:width .4s ease; }
  .gauge .fill.baja  { background:var(--verde); }
  .gauge .fill.media { background:var(--ambar); }
  .gauge .fill.alta  { background:var(--rojo); }
  .gauge .mark { position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--slate-700); }
  .gauge .mark::after { content:"umbral"; position:absolute; top:-15px; left:50%; transform:translateX(-50%);
                        font-size:0.62rem; font-weight:700; color:var(--slate-700); white-space:nowrap; }
  .gauge-legend { display:flex; justify-content:space-between; font-size:0.72rem; color:var(--slate-500); margin-bottom:14px; }
  .calc { list-style:none; }
  .calc li { display:flex; justify-content:space-between; align-items:baseline; gap:10px;
             padding:8px 0; border-bottom:1px solid var(--slate-200); font-size:0.9rem; }
  .calc li:last-child { border-bottom:0; }
  .calc li .k { color:var(--slate-700); }
  .calc li .v { font-weight:700; color:var(--verde-900); text-align:right; }
  .calc li.tot .v { font-size:1.05rem; }
  .calc-note { font-size:0.8rem; color:var(--slate-500); line-height:1.5; margin-top:12px; }
  .calc-note b { color:var(--slate-700); }

  /* Comparativa */
  .totales { display:flex; gap:12px; margin-bottom:18px; }
  .tot { flex:1; border-radius:14px; padding:14px; }
  .tot.kylia { background:var(--verde-50); }
  .tot.padre { background:var(--marron-50); }
  .tot .who { font-size:0.78rem; font-weight:700; display:flex; align-items:center; gap:6px; }
  .tot.kylia .who { color:var(--verde-900); }
  .tot.padre .who { color:var(--marron); }
  .tot .swatch { width:11px; height:11px; border-radius:3px; }
  .tot .num { font-size:1.5rem; font-weight:800; letter-spacing:-0.02em; margin-top:6px; }
  .tot .uni { font-size:0.8rem; color:var(--slate-500); }
  .veredicto { text-align:center; padding:14px; border-radius:14px; background:var(--slate-50);
               font-weight:700; color:var(--slate-900); margin-bottom:4px; }
  .veredicto b { color:var(--verde-900); }
  .legend { display:flex; gap:16px; justify-content:center; margin-top:10px; font-size:0.82rem; color:var(--slate-700); }
  .legend span { display:flex; align-items:center; gap:6px; }
  .legend .ln { width:18px; height:3px; border-radius:2px; }
  svg.chart { width:100%; height:auto; display:block; }
  .caveat { font-size:0.8rem; color:var(--slate-500); line-height:1.5; margin-top:6px; }

  /* Cuaderno de campo (registro) */
  .tabs { display:flex; gap:6px; margin-bottom:16px; }
  .tab { flex:1; padding:9px 6px; border:1.5px solid var(--slate-200); background:#fff; border-radius:10px;
         font-family:inherit; font-weight:700; font-size:0.86rem; color:var(--slate-500); cursor:pointer; }
  .tab.on { background:var(--verde); border-color:var(--verde); color:#fff; }
  .pane { display:none; }
  .pane.on { display:block; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:0.82rem; font-weight:600; color:var(--slate-700); margin-bottom:5px; }
  .field input, .field select {
    width:100%; padding:11px 12px; border:1.5px solid var(--slate-200); border-radius:10px;
    font-family:inherit; font-size:1rem; color:var(--slate-900); background:#fff;
  }
  .field input:focus, .field select:focus { outline:none; border-color:var(--verde); }
  .hint { font-size:0.8rem; color:var(--slate-500); margin-top:5px; }
  .btn { width:100%; padding:13px; background:var(--verde); color:#fff; border:0; border-radius:10px;
         font-family:inherit; font-weight:700; font-size:1rem; cursor:pointer; margin-top:4px; }
  .btn:disabled { opacity:0.5; }
  .row2 { display:flex; gap:10px; }
  .row2 > * { flex:1; }

  .foot { text-align:center; color:var(--slate-500); font-size:0.78rem; margin:22px 2px 8px; line-height:1.5; }
  .msg { text-align:center; color:var(--slate-500); padding:40px 20px; }
  .msg code { background:var(--slate-200); padding:2px 6px; border-radius:6px; font-size:0.85em; }
  .skel { animation:pulse 1.3s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }

  #toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(80px);
           background:var(--verde-900); color:#fff; padding:12px 22px; border-radius:999px; font-weight:600;
           font-size:0.92rem; box-shadow:var(--shadow); transition:transform 0.28s cubic-bezier(0.22,0.61,0.36,1);
           z-index:99; }
  #toast.show { transform:translateX(-50%) translateY(0); }
  #toast.err { background:var(--rojo); }
</style>
</head>
<body>
  <div class="app">
    <div class="brand"><span class="dot"></span> Kylia</div>

    <nav class="nav">
      <button data-screen="lechugas" class="on">🪣 Mis lechugas</button>
      <button data-screen="padre">💦 Campo del padre</button>
      <button data-screen="comparativa">📊 Comparativa</button>
    </nav>

    <!-- Pantalla: riego de hoy (lechugas / padre) -->
    <div id="root"><div class="msg skel">Calculando el riego de hoy…</div></div>

    <!-- Cuaderno de campo (oculto hasta que carga el usuario) -->
    <div class="card" id="registro" style="display:none">
      <div class="label">Registrar lo de hoy</div>
      <div class="tabs">
        <button class="tab on" data-pane="riego">💧 Riego</button>
        <button class="tab" data-pane="trat">🧪 Tratamiento</button>
        <button class="tab" data-pane="obs">👁️ Observación</button>
      </div>

      <div class="pane on" data-pane="riego">
        <div class="row2">
          <div class="field">
            <label for="r-cant" id="r-label">Cubos echados</label>
            <input id="r-cant" type="number" inputmode="decimal" step="0.5" min="0" placeholder="ej. 1.5" />
          </div>
          <div class="field">
            <label for="r-franja">Momento</label>
            <select id="r-franja">
              <option value="">—</option>
              <option value="manana">Mañana</option>
              <option value="mediodia">Mediodía</option>
              <option value="tarde">Tarde</option>
              <option value="noche">Noche</option>
            </select>
          </div>
        </div>
        <div class="hint" id="r-hint"></div>
        <button class="btn" data-send="riego">Registrar riego</button>
      </div>

      <div class="pane" data-pane="trat">
        <div class="field"><label for="t-prod">Producto aplicado</label>
          <input id="t-prod" type="text" maxlength="160" placeholder="ej. jabón potásico" /></div>
        <div class="row2">
          <div class="field"><label for="t-dosis">Dosis (opcional)</label>
            <input id="t-dosis" type="text" maxlength="80" placeholder="ej. 20 ml/L" /></div>
          <div class="field"><label for="t-franja">Momento</label>
            <select id="t-franja"><option value="">—</option><option value="manana">Mañana</option>
              <option value="mediodia">Mediodía</option><option value="tarde">Tarde</option>
              <option value="noche">Noche</option></select></div>
        </div>
        <div class="field"><label for="t-notas">Notas (opcional)</label>
          <input id="t-notas" type="text" maxlength="200" placeholder="ej. solo en 2 lechugas" /></div>
        <button class="btn" data-send="trat">Registrar tratamiento</button>
      </div>

      <div class="pane" data-pane="obs">
        <div class="row2">
          <div class="field"><label for="o-tipo">Qué viste</label>
            <select id="o-tipo"><option value="plaga">Plaga</option><option value="enfermedad">Enfermedad</option>
              <option value="estres">Estrés (calor, falta de agua…)</option><option value="otro">Otro</option></select></div>
          <div class="field"><label for="o-sev">Gravedad</label>
            <select id="o-sev"><option value="">—</option><option value="1">1 · leve</option>
              <option value="2">2</option><option value="3">3 · media</option><option value="4">4</option>
              <option value="5">5 · grave</option></select></div>
        </div>
        <div class="field"><label for="o-desc">Descripción</label>
          <input id="o-desc" type="text" maxlength="300" placeholder="ej. pulgón en el envés de 1 lechuga" /></div>
        <button class="btn" data-send="obs">Registrar observación</button>
      </div>
    </div>

    <!-- Pantalla: comparativa Kylia vs padre -->
    <div id="comparativa" style="display:none"><div class="msg skel">Cargando comparativa…</div></div>

    <p class="foot">
      Cálculo FAO-56 con el clima de Sant Boi en vivo (Open-Meteo).<br>
      El campo del padre es laboratorio abierto: aquí Kylia habla y registramos lo real.
    </p>
  </div>
  <div id="toast"></div>

<script>
  // Dos campos reales del padre, comparados siempre POR m² (escalas distintas):
  //   lechugas → 10 lechugas a regadera (lo que llevamos con Kylia)
  //   padre    → 500 m² a aspersión (la parcela tradicional, rama de contraste)
  const CAMPOS = {
    lechugas: { id:"9aaa1b25-6fad-4213-9eda-e135af71b2c3", titulo:"Tus 10 lechugas", unidad:"cubos" },
    padre:    { id:"23567ff1-7368-4dc9-b777-fdeaab9f8714", titulo:"Campo del padre · 500 m²", unidad:"horas" },
  };
  let SCREEN = "lechugas";
  let USUARIO = {};            // datos del campo cargado (del fetch de "hoy")
  const campoActual = () => CAMPOS[SCREEN === "comparativa" ? "lechugas" : SCREEN];

  const NIVEL = {
    baja:  { tag:"Hoy",      titular:"No toca regar" },
    media: { tag:"Atención", titular:"Vigila el riego" },
    alta:  { tag:"Hoy toca", titular:"Riega" },
  };
  const fmtFecha = iso => { const [,m,d] = iso.split("-"); return `${d}/${m}`; };
  const hoyLocal = () => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  };
  const toast = (txt, err) => {
    const t = document.getElementById("toast");
    t.textContent = txt; t.className = "show" + (err ? " err" : "");
    setTimeout(() => { t.className = err ? "err" : ""; }, 2600);
  };

  // ── Pantalla "hoy" ────────────────────────────────────────────
  function pintarHoy(data) {
    const root = document.getElementById("root");
    if (!data.ok) {
      const txt = data.error && /no encontrado/.test(data.error)
        ? `Este campo aún no está dado de alta. Ejecuta el SQL de alta en Supabase.`
        : `No se pudo cargar: ${data.error || data.reason || "error"}.`;
      root.innerHTML = `<div class="msg">${txt}</div>`;
      document.getElementById("registro").style.display = "none";
      return;
    }
    USUARIO = data.usuario || {};
    const h = data.hoy, u = USUARIO, n = NIVEL[h.nivel] || NIVEL.baja;
    const titular = h.nivel === "alta" && h.presentacion ? `Riega ~${h.presentacion.texto}` : n.titular;

    let html = `
      <h1>${campoActual().titulo}</h1>
      <div class="sub">${u.ciudad || ""}${u.cultivo ? " · " + u.cultivo : ""} · ${fmtFecha(h.fecha)}</div>
      <div class="estado ${h.nivel}">
        <span class="tag">${n.tag}</span>
        <div class="titular">${titular}</div>
        <div class="porque">Déficit de agua en el suelo: <b>${h.deficit_mm} mm</b>
          de un umbral de <b>${h.umbral_mm} mm</b> para regar.</div>
        <div class="chips">
          <span class="chip">💧 Lluvia hoy ${h.lluvia} mm</span>
          <span class="chip">☀️ Evaporación ${h.et0} mm</span>
        </div>
      </div>
      <div class="card"><div class="label">Próximo riego previsto</div>`;
    if (data.proximo) {
      html += `<div class="next"><span class="big">${fmtFecha(data.proximo.fecha)}</span>
               <span>· aprox. ${data.proximo.presentacion?.texto || "—"}</span></div>`;
    } else {
      html += `<div class="next"><span>Sin riego previsto en los próximos 7 días — el suelo tiene reserva suficiente.</span></div>`;
    }
    html += `</div>`;

    html += desgloseCard(data.desglose, h.nivel);

    if (data.riegos_recientes && data.riegos_recientes.length) {
      html += `<div class="card"><div class="label">Riegos registrados</div><ul class="hist">`;
      for (const r of data.riegos_recientes) {
        const v = r.cubos != null ? `${r.cubos} cubo${r.cubos === 1 ? "" : "s"}` : `${r.l_m2} L/m²`;
        html += `<li><span class="f">${fmtFecha(r.fecha)}</span><span class="v">${v}</span></li>`;
      }
      html += `</ul></div>`;
    }
    root.innerHTML = html;

    // Cuaderno + adaptación del input de riego al método del campo
    document.getElementById("registro").style.display = "";
    const esAspersion = u.metodo_riego === "aspersion";
    document.getElementById("r-label").textContent = esAspersion ? "Horas de aspersor" : "Cubos echados";
    document.getElementById("r-cant").placeholder = esAspersion ? "ej. 1.5" : "ej. 1.5";
    const hint = document.getElementById("r-hint");
    if (esAspersion && u.caudal) {
      hint.textContent = `≈ ${u.caudal} mm/h (estimado) · 1 h ≈ ${u.caudal} L/m².`;
    } else if (u.capacidad_regadera && u.area_m2) {
      hint.textContent = `Cada cubo = ${u.capacidad_regadera} L sobre ${u.area_m2} m².`;
    } else { hint.textContent = ""; }
  }

  // Tarjeta "el porqué de hoy": de dónde sale la decisión (balance FAO-56).
  function desgloseCard(d, nivel) {
    if (!d) return "";
    const pct = v => Math.max(0, Math.min(100, (v / d.taw) * 100));
    const cierre = nivel === "alta"
      ? `El déficit alcanzó el umbral → <b>toca regar</b>.`
      : nivel === "media"
        ? `El déficit se acerca al umbral → <b>conviene vigilar</b>.`
        : `El déficit está por debajo del umbral → <b>aún hay reserva</b>.`;
    const fase = d.fase ? `, fase <b>${d.fase}</b>${d.dias_planta != null ? ` (día ${d.dias_planta})` : ""}` : "";
    return `
      <div class="card">
        <div class="label">El porqué de hoy</div>
        <div class="gauge">
          <div class="fill ${nivel}" style="width:${pct(d.dr)}%"></div>
          <div class="mark" style="left:${pct(d.raw)}%"></div>
        </div>
        <div class="gauge-legend"><span>suelo lleno</span><span>vacío · ${d.taw} mm</span></div>
        <ul class="calc">
          <li><span class="k">Gasto de la planta hoy (ETc = Kc × ET₀)</span>
              <span class="v">${d.kc} × ${d.et0} = ${d.etc} mm</span></li>
          <li><span class="k">Lluvia que entró hoy</span><span class="v">− ${d.lluvia} mm</span></li>
          <li class="tot"><span class="k">Déficit acumulado en el suelo</span><span class="v">${d.dr} mm</span></li>
          <li><span class="k">Umbral para regar (45% del suelo)</span><span class="v">${d.raw} mm</span></li>
        </ul>
        <p class="calc-note">
          Suelo <b>${d.suelo}</b>: caben <b>${d.taw} mm</b> de agua útil; Kylia riega al gastar el 45%
          → umbral <b>${d.raw} mm</b>. Cultivo <b>${d.cultivo || "—"}</b>${fase} → bebe Kc=${d.kc}× la
          evaporación del aire (ET₀, del clima en vivo). ${cierre}
        </p>
      </div>`;
  }

  function cargarHoy() {
    document.getElementById("registro").style.display = "none";
    document.getElementById("root").innerHTML = `<div class="msg skel">Calculando el riego de hoy…</div>`;
    fetch(`/api/campo?vista=hoy&usuario_id=${encodeURIComponent(campoActual().id)}`)
      .then(r => r.json()).then(pintarHoy)
      .catch(e => { document.getElementById("root").innerHTML =
        `<div class="msg">No se pudo conectar.<br><small>${e.message}</small></div>`; });
  }

  // ── Pantalla "comparativa" ────────────────────────────────────
  function chartSVG(serie) {
    const W = 340, H = 200, padL = 6, padR = 6, padT = 16, padB = 26;
    const n = serie.length;
    const maxY = Math.max(1, ...serie.map(p => Math.max(p.kylia_l_m2, p.padre_l_m2)));
    const xF = i => padL + (n <= 1 ? 0 : (i / (n - 1)) * (W - padL - padR));
    const yF = v => H - padB - (v / maxY) * (H - padT - padB);
    const poly = key => serie.map((p, i) => `${xF(i).toFixed(1)},${yF(p[key]).toFixed(1)}`).join(" ");
    const dot = (key, color) => { const p = serie[n - 1];
      return `<circle cx="${xF(n-1).toFixed(1)}" cy="${yF(p[key]).toFixed(1)}" r="3.5" fill="${color}"/>`; };
    return `
      <svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Agua acumulada por m²">
        <line x1="${padL}" y1="${yF(0)}" x2="${W-padR}" y2="${yF(0)}" stroke="#e2e8f0" stroke-width="1"/>
        <text x="${padL}" y="${padT-4}" font-size="10" fill="#64748b">${maxY.toFixed(0)} L/m²</text>
        <polyline fill="none" stroke="#8a5a2b" stroke-width="2.5" stroke-linejoin="round"
                  stroke-linecap="round" points="${poly("padre_l_m2")}"/>
        <polyline fill="none" stroke="#013A27" stroke-width="2.5" stroke-linejoin="round"
                  stroke-linecap="round" points="${poly("kylia_l_m2")}"/>
        ${dot("padre_l_m2","#8a5a2b")}${dot("kylia_l_m2","#013A27")}
        <text x="${padL}" y="${H-8}" font-size="10" fill="#64748b">${fmtFecha(serie[0].date)}</text>
        <text x="${W-padR}" y="${H-8}" font-size="10" fill="#64748b" text-anchor="end">${fmtFecha(serie[n-1].date)}</text>
      </svg>`;
  }

  function pintarComparativa(data) {
    const box = document.getElementById("comparativa");
    if (!data.ok) {
      box.innerHTML = `<div class="msg">No se pudo cargar la comparativa: ${data.error || data.reason || "error"}.<br>
        <small>¿Ejecutaste <code>db/alta-campo-padre-aspersion.sql</code> en Supabase?</small></div>`;
      return;
    }
    const t = data.totales, c = data.campo;
    const litros = (lm2) => c.area_m2 ? ` · ≈ ${Math.round(lm2 * c.area_m2).toLocaleString("es-ES")} L` : "";

    let veredicto;
    if (t.dif_l_m2 > 0.5) {
      const litros = c.area_m2 ? Math.round(t.dif_l_m2 * c.area_m2).toLocaleString("es-ES") : null;
      veredicto = `Siguiendo a Kylia ahorrarías
        <b style="color:var(--verde-900)">${t.dif_l_m2} L/m²${t.ahorro_pct != null ? ` (${t.ahorro_pct}%)` : ""}</b>
        en este campo${litros ? ` · ≈ <b>${litros} L menos</b> en 500 m²` : ""}.`;
    } else if (t.dif_l_m2 < -0.5) {
      veredicto = `Aquí Kylia habría regado <b>${Math.abs(t.dif_l_m2)} L/m² más</b> —
        tu padre se está quedando corto (ojo al estrés hídrico). Ahorrar no es regar menos, es regar lo justo.`;
    } else {
      veredicto = `De momento van <b>a la par</b> (${t.kylia_l_m2} vs ${t.padre_l_m2} L/m²) —
        el ahorro se verá según avance la campaña.`;
    }

    let ferts = "";
    if (data.fertilizantes && data.fertilizantes.length) {
      ferts = `<div class="card"><div class="label">Tratamientos del padre (cualitativo)</div><ul class="hist">`;
      for (const f of data.fertilizantes)
        ferts += `<li><span class="f">${f.producto}</span><span class="v">×${f.veces}</span></li>`;
      ferts += `</ul></div>`;
    }

    const hayDatos = data.serie && data.serie.length >= 1;
    box.innerHTML = `
      <h1>Kylia vs tu padre</h1>
      <div class="sub">${c.cultivo || ""} · agua acumulada por m² · desde ${data.desde ? fmtFecha(data.desde) : "—"}</div>

      <div class="card">
        <div class="totales">
          <div class="tot kylia">
            <div class="who"><span class="swatch" style="background:#013A27"></span> Kylia recomienda</div>
            <div class="num">${t.kylia_l_m2} <span class="uni">L/m²</span></div>
            <div class="uni">${c.area_m2 ? "≈ " + (t.kylia_litros||0).toLocaleString("es-ES") + " L en 500 m²" : ""}</div>
          </div>
          <div class="tot padre">
            <div class="who"><span class="swatch" style="background:#8a5a2b"></span> Tu padre aplicó</div>
            <div class="num">${t.padre_l_m2} <span class="uni">L/m²</span></div>
            <div class="uni">${c.area_m2 ? "≈ " + (t.padre_litros||0).toLocaleString("es-ES") + " L en 500 m²" : ""}</div>
          </div>
        </div>
        <div class="veredicto">${veredicto}</div>
        ${hayDatos ? chartSVG(data.serie) : `<div class="msg">Aún no hay riegos suficientes para la gráfica.</div>`}
        <div class="legend">
          <span><span class="ln" style="background:#013A27"></span> Kylia (FAO-56)</span>
          <span><span class="ln" style="background:#8a5a2b"></span> Padre (real)</span>
        </div>
      </div>

      ${ferts}

      <p class="caveat">
        Comparación sobre el <b>mismo campo</b> (los 500 m² de tu padre): misma lluvia, mismo suelo y cultivo.
        🟤 lo que aplicó él &nbsp;vs&nbsp; 🟢 lo que Kylia le habría recomendado — solo cambia <b>quién decide</b>,
        así el hueco es agua de la decisión, no del tamaño de la parcela. <b>No se cuenta el riego de asentamiento</b>
        del trasplante (la comparación empieza al día siguiente). El caudal del aspersor (${c.caudal_mmh || 10} mm/h)
        es estimado — afínalo con el truco del vaso y la gráfica se recalcula.
      </p>`;
  }

  function cargarComparativa() {
    const box = document.getElementById("comparativa");
    box.innerHTML = `<div class="msg skel">Cargando comparativa…</div>`;
    fetch(`/api/campo?vista=comparativa&usuario_id=${encodeURIComponent(CAMPOS.padre.id)}`)
      .then(r => r.json()).then(pintarComparativa)
      .catch(e => { box.innerHTML = `<div class="msg">No se pudo conectar.<br><small>${e.message}</small></div>`; });
  }

  // ── Navegación ────────────────────────────────────────────────
  function irA(screen) {
    SCREEN = screen;
    document.querySelectorAll(".nav button").forEach(b => b.classList.toggle("on", b.dataset.screen === screen));
    const esComp = screen === "comparativa";
    document.getElementById("root").style.display = esComp ? "none" : "";
    document.getElementById("registro").style.display = "none";
    document.getElementById("comparativa").style.display = esComp ? "" : "none";
    if (esComp) cargarComparativa(); else cargarHoy();
  }
  document.querySelectorAll(".nav button").forEach(b =>
    b.addEventListener("click", () => irA(b.dataset.screen)));

  // ── Registro (POST /api/log) ──────────────────────────────────
  async function enviar(recurso, fila) {
    const body = { recurso, usuario_id: campoActual().id, fecha_local: hoyLocal(),
                   cultivo: USUARIO.cultivo || null, ...fila };
    const res = await fetch("/api/log", {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok || j.ok === false) throw new Error(j.error || "error al guardar");
  }

  const val = id => document.getElementById(id).value.trim();
  const acciones = {
    riego: async () => {
      const cant = parseFloat(val("r-cant"));
      if (!(cant > 0)) { toast(USUARIO.metodo_riego === "aspersion" ? "Pon las horas" : "Pon cuántos cubos", true); return; }
      const fila = { tipo: "riego", franja_horaria: val("r-franja") || null };
      if (USUARIO.metodo_riego === "aspersion") {
        fila.duracion_min = Math.round(cant * 60);
        fila.notas = `${cant} h de aspersión`;
        if (USUARIO.caudal) fila.cantidad_l_m2 = Math.round((cant * USUARIO.caudal) * 10) / 10;  // horas × mm/h
      } else {
        fila.notas = `${cant} cubo${cant === 1 ? "" : "s"}`;
        if (USUARIO.capacidad_regadera && USUARIO.area_m2)
          fila.cantidad_l_m2 = Math.round((cant * USUARIO.capacidad_regadera / USUARIO.area_m2) * 10) / 10;
      }
      await enviar("acciones", fila);
      document.getElementById("r-cant").value = "";
    },
    trat: async () => {
      const prod = val("t-prod");
      if (!prod) { toast("Pon el producto", true); return; }
      await enviar("acciones", { tipo: "aplicacion", producto_nombre: prod,
        dosis: val("t-dosis") || null, franja_horaria: val("t-franja") || null, notas: val("t-notas") || null });
      ["t-prod","t-dosis","t-notas"].forEach(i => document.getElementById(i).value = "");
    },
    obs: async () => {
      const desc = val("o-desc");
      if (!desc) { toast("Describe lo que viste", true); return; }
      await enviar("observaciones", { tipo: val("o-tipo"), descripcion: desc, severidad: val("o-sev") || null });
      document.getElementById("o-desc").value = "";
    },
  };

  // Pestañas del cuaderno
  document.querySelectorAll(".tab").forEach(tab => tab.addEventListener("click", () => {
    const p = tab.dataset.pane;
    document.querySelectorAll(".tab").forEach(t => t.classList.toggle("on", t === tab));
    document.querySelectorAll(".pane").forEach(pane => pane.classList.toggle("on", pane.dataset.pane === p));
  }));
  // Botones de envío
  document.querySelectorAll("[data-send]").forEach(btn => btn.addEventListener("click", async () => {
    btn.disabled = true;
    try { await acciones[btn.dataset.send](); toast("✓ Registrado"); cargarHoy(); }
    catch (e) { toast(e.message || "No se pudo guardar", true); }
    finally { btn.disabled = false; }
  }));

  irA("lechugas");
</script>
</body>
</html>
